<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボードゲーム・カジノ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1c23; color: #f3f4f6; margin: 0; padding: 0; }
        
        /* グローバルヘッダー */
        #global-header-bar { position: fixed; top: 0; left: 0; width: 100%; background: #2d3142; padding: 8px 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffd700; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .header-left { font-weight: bold; font-size: 14px; white-space: nowrap; }
        .header-controls { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
        .sm-btn { background: #3b82f6; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; white-space: nowrap; transition: 0.2s; }
        .sm-btn:hover { background: #2563eb; }
        .vol-btn { background: #4b5563; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .danger-bg { background: #ef4444 !important; } .danger-bg:hover { background: #dc2626 !important; }

        /* 音量ゲージ */
        .vol-gauge { display: flex; gap: 2px; align-items: center; }
        .vol-bar { width: 4px; height: 12px; background: #0f1115; border: 1px solid #3f4257; box-sizing: border-box; }
        .vol-bar.active { background: #ffffff; border-color: #ffffff; box-shadow: 0 0 3px rgba(255,255,255,0.8); }

        /* メインコンテンツ */
        .main-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding-top: 60px; box-sizing: border-box; padding-bottom: 20px; }
        .container { background-color: #242631; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 95%; max-width: 500px; text-align: center; }
        
        h1 { color: #ffd700; margin-bottom: 20px; font-size: 22px; }
        .hidden { display: none !important; }
        
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #3f4257; background-color: #1a1c23; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; }
        
        /* ボタン類 */
        button.main-btn { background-color: #ffd700; color: #1a1c23; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button.main-btn:hover { background-color: #e6c200; }
        button.main-btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        button.danger-btn { background-color: #ef4444; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button.danger-btn:hover { background-color: #dc2626; }
        button.blue-btn { background-color: #3b82f6; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button.blue-btn:hover { background-color: #2563eb; }
        
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .emoji-btn { font-size: 28px; background: #1a1c23; border: 2px solid #3f4257; border-radius: 8px; cursor: pointer; padding: 8px; transition: 0.2s; }
        .emoji-btn.selected { border-color: #ffd700; background-color: #2d3142; transform: scale(1.05); }
        .profile-bar { background: #1a1c23; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 4px solid #ffd700; }
        
        .section-title { font-size: 13px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; margin-top: 10px; text-align: left; }
        .user-list { background: #1a1c23; border-radius: 8px; padding: 10px; min-height: 50px; text-align: left; margin-bottom: 15px; }
        .list-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #2d303f; font-size: 14px; }
        .list-item:last-child { border-bottom: none; }
        .badge { color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; white-space: nowrap; }
        .bg-host { background: #3f4257; } .bg-oya { background: #ef4444; } .bg-turn { background: #10b981; } .bg-done { background: #3b82f6; }
        
        .game-card { background: #1a1c23; border: 1px solid #3f4257; border-radius: 8px; padding: 15px; text-align: left; margin-bottom: 15px; }
        .game-card h3 { margin: 0 0 10px 0; color: #fff; }
        
        .result-box { background: #2d303f; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: left; border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .my-result-card { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .win-text { color: #10b981; } .lose-text { color: #ef4444; } .draw-text { color: #9ca3af; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }

        /* 3Dサイコロ */
        .dice-area { display: flex; justify-content: center; gap: 15px; margin: 25px 0; perspective: 600px; min-height: 60px; }
        .dice-3d { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .face { position: absolute; width: 60px; height: 60px; background: #f8f9fa; border-radius: 8px; box-shadow: inset 0 0 15px rgba(0,0,0,0.1), 0 0 2px rgba(0,0,0,0.2); display: grid; grid-template-areas: "a b c" "d e f" "g h i"; padding: 10px; box-sizing: border-box; }
        .dot { width: 12px; height: 12px; background: #1f2937; border-radius: 50%; box-shadow: inset 0 3px 5px rgba(0,0,0,0.5), 0 1px 1px rgba(255,255,255,0.8); justify-self: center; align-self: center; }
        .front .dot-center { background: #ef4444; width: 16px; height: 16px; }
        .dot-center { grid-area: e; } .dot-top-left { grid-area: a; } .dot-top-right { grid-area: c; } .dot-middle-left { grid-area: d; } .dot-middle-right { grid-area: f; } .dot-bottom-left { grid-area: g; } .dot-bottom-right { grid-area: i; }
        .front  { transform: translateZ(30px); } .back   { transform: rotateY(180deg) translateZ(30px); } .right  { transform: rotateY(90deg) translateZ(30px); } .left   { transform: rotateY(-90deg) translateZ(30px); } .top    { transform: rotateX(90deg) translateZ(30px); } .bottom { transform: rotateX(-90deg) translateZ(30px); }
        @keyframes auto-spin { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(1080deg) rotateY(1080deg); } }
        .spinning { animation: auto-spin 1s linear infinite; transition: none !important; }

        /* スマホ機能のUI */
        #smartphone-toggle-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #3b82f6; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 2px solid #fff; cursor: pointer; z-index: 1500; transition: transform 0.2s; }
        #smartphone-toggle-btn:hover { transform: scale(1.1); }
        #smartphone-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .phone-container { width: 340px; height: 650px; max-height: 95vh; background: #1a1c23; border-radius: 40px; border: 10px solid #2d3142; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .phone-header { background: #111; padding: 10px; text-align: center; font-size: 12px; font-weight: bold; color: #fff; display: flex; justify-content: space-between; }
        .phone-content { flex: 1; padding: 20px; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/stardust.png') #1a1c23; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .app-icon { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; color: #f3f4f6; font-size: 12px; font-weight: bold; }
        .app-icon-bg { width: 60px; height: 60px; border-radius: 18px; background: #3b82f6; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); transition: transform 0.2s; }
        .app-icon:hover .app-icon-bg { transform: scale(1.05); }
        .phone-home-bar { height: 5px; width: 120px; background: #fff; border-radius: 10px; margin: 15px auto; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .phone-home-bar:hover { opacity: 1; background: #ffd700; }
        .app-screen { background: #242631; border-radius: 12px; padding: 15px; margin-bottom: 10px; text-align: left; border: 1px solid #3f4257; min-height: 80%; }
        .app-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #ffd700; border-bottom: 1px solid #3f4257; padding-bottom: 10px; text-align: center; }
        
        .friend-tabs { display: flex; border-bottom: 1px solid #3f4257; margin-bottom: 15px; }
        .friend-tab { flex: 1; text-align: center; padding: 10px 0; cursor: pointer; color: #9ca3af; font-size: 14px; font-weight: bold; }
        .friend-tab.active { color: #ffd700; border-bottom: 2px solid #ffd700; }
        .friend-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d303f; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-online { background-color: #10b981; box-shadow: 0 0 5px #10b981; }
        .status-offline { background-color: #ef4444; }
        .add-friend-input { width: calc(100% - 24px); margin-bottom: 10px; padding: 10px; }

        /* スロットUI */
        .slot-reel { width: 45px; height: 60px; background: #eee; display: flex; justify-content: center; align-items: center; font-size: 45px; font-weight: bold; color: #111; border: 1px solid #ccc; overflow: hidden; position: relative; border-radius: 4px; }
        .slot-reel.rolling { animation: verticalBlur 0.05s infinite linear; color: #555; }
        @keyframes verticalBlur { 0% { transform: translateY(-20px); filter: blur(2px); } 100% { transform: translateY(20px); filter: blur(2px); } }
        
        #peka-lamp { width: 30px; height: 30px; background: #330000; border-radius: 50%; margin: 0 auto 15px auto; transition: 0.1s; display:flex; justify-content:center; align-items:center; }
        
        /* 別枠用ヘッダー */
        .top-action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <audio id="bgm-audio" src="jazz_bgm.mp3" loop></audio>

    <div id="global-header-bar">
        <div class="header-left">
            <span id="hdr-logo">🎲 カジノ</span>
            <span id="hdr-room-info" class="hidden">🏠 <span id="hdr-room-code" style="color: #ffd700;"></span></span>
        </div>
        <div class="header-controls">
            <div style="display:flex; align-items:center; gap:3px;">
                <span>🎵</span>
                <button class="vol-btn" onclick="changeVol(-1)">-</button>
                <div class="vol-gauge" id="vol-gauge-container">
                    <div class="vol-bar" id="vol-bar-1"></div><div class="vol-bar" id="vol-bar-2"></div><div class="vol-bar" id="vol-bar-3"></div><div class="vol-bar" id="vol-bar-4"></div><div class="vol-bar" id="vol-bar-5"></div>
                    <div class="vol-bar" id="vol-bar-6"></div><div class="vol-bar" id="vol-bar-7"></div><div class="vol-bar" id="vol-bar-8"></div><div class="vol-bar" id="vol-bar-9"></div><div class="vol-bar" id="vol-bar-10"></div>
                </div>
                <button class="vol-btn" onclick="changeVol(1)">+</button>
            </div>
            <button id="hdr-copy-btn" class="sm-btn hidden" onclick="copyInviteUrl()">🔗 招待</button>
            <button id="hdr-leave-btn" class="sm-btn danger-bg hidden" onclick="leaveRoomEntirely()">🚪 退出</button>
        </div>
    </div>

    <div id="smartphone-toggle-btn" onclick="togglePhone(true)">📱</div>

    <div id="smartphone-overlay" class="hidden">
        <div class="phone-container">
            <div class="phone-header">
                <span></span><span>12:00</span><span>🔋 98%</span>
            </div>
            
            <div class="phone-content" id="phone-home-screen">
                <div style="font-size: 24px; font-weight: bold; text-align: center; margin-top: 10px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Home</div>
                <div class="app-grid">
                    <div class="app-icon" onclick="openApp('bank')"><div class="app-icon-bg" style="background: linear-gradient(135deg, #10b981, #059669);">🏦</div>送金</div>
                    <div class="app-icon" onclick="openApp('stock')"><div class="app-icon-bg" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">📈</div>株価チャート</div>
                    <div class="app-icon" onclick="openApp('debt')"><div class="app-icon-bg" style="background: linear-gradient(135deg, #ef4444, #dc2626);">💳</div>帝愛金融</div>
                    <div class="app-icon" onclick="openApp('friends')"><div class="app-icon-bg" style="background: linear-gradient(135deg, #f59e0b, #d97706);">👥</div>フレンド</div>
                </div>
            </div>

            <div class="phone-content hidden" id="phone-app-screen">
                <div class="app-screen">
                    <div class="app-title" id="app-title-text">App</div>
                    <div id="app-body-content" style="color: #e5e7eb; font-size: 14px;"></div>
                </div>
            </div>

            <div style="background: #111; padding-bottom: 5px;">
                <div class="phone-home-bar" onclick="togglePhone(false)"></div>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="container">
            <div id="login-screen">
                <h1>入場手続き</h1>
                <input type="text" id="username" placeholder="名前を入力" maxlength="10">
                <div class="emoji-grid">
                    <button class="emoji-btn" onclick="selectEmoji('🐱')">🐱</button>
                    <button class="emoji-btn" onclick="selectEmoji('🕶️')">🕶️</button>
                    <button class="emoji-btn" onclick="selectEmoji('🎲')">🎲</button>
                    <button class="emoji-btn" onclick="selectEmoji('🦊')">🦊</button>
                </div>
                <button class="main-btn" id="login-btn">決定</button>
            </div>

            <div id="home-screen" class="hidden">
                <h1>ホーム</h1>
                <div class="profile-bar">
                    <div>
                        <span id="my-emoji"></span> <span id="my-name"></span>
                        <button onclick="changeName()" style="background:none; border:none; color:#ffd700; cursor:pointer; margin-left:5px;">✏️</button>
                    </div>
                    <div style="color: #ffd700;">🪙 <span id="my-coins-home"></span> コイン</div>
                </div>
                <button class="main-btn" id="create-room-btn">🌟 新しく部屋を作る</button>
                <div class="section-title">合言葉で参加</div>
                <input type="text" id="room-code-input" placeholder="部屋コードを入力">
                <button class="main-btn" id="join-room-btn" style="background-color: #3b82f6; color: white;">入室する</button>
                
                <div class="section-title" style="margin-top: 30px;">1人用ゲーム</div>
                <div class="game-card">
                    <h3>🎰 スロット</h3>
                    <p style="font-size: 12px; color: #9ca3af;">1回10コインでちびちび稼ぐ！</p>
                    <button class="main-btn" id="play-slot-btn" style="padding: 10px; background-color: #f59e0b; color: white;">スロットを回す</button>
                </div>
            </div>

            <div id="room-lobby-screen" class="hidden">
                <h1>ルームロビー</h1>
                <div class="profile-bar">
                    <div>
                        <span id="lobby-my-emoji"></span> <span id="lobby-my-name"></span>
                        <button onclick="changeName()" style="background:none; border:none; color:#ffd700; cursor:pointer; margin-left:5px;">✏️</button>
                    </div>
                </div>
                
                <div class="section-title">部屋にいるメンバー</div>
                <div class="user-list" id="room-members-list"></div>

                <div class="section-title">遊べるゲーム卓</div>
                <div class="game-card">
                    <h3>🎲 チンチロ</h3>
                    <p style="font-size: 12px; color: #9ca3af;" id="chinchiro-status-text">待機中 (0人)</p>
                    <button class="main-btn" id="join-chinchiro-btn" style="padding: 10px;">卓に参加する</button>
                </div>
            </div>

            <div id="slot-screen" class="hidden">
                <div class="top-action-bar">
                    <h1 style="margin:0;">🎰 スロット</h1>
                    <button class="sm-btn danger-bg" onclick="showScreen('home-screen')" style="padding: 10px 15px; font-size: 14px;">🚪 ロビーへ戻る</button>
                </div>
                
                <div class="profile-bar">
                    <div>所持: 🪙 <span id="slot-my-coins"></span> コイン</div>
                </div>

                <div style="background: #111; padding: 30px 20px; border-radius: 8px; margin-bottom: 20px;">
                    <div id="peka-lamp">
                        <span style="color:#550000; font-size:8px; font-weight:bold;">GOGO</span>
                    </div>
                    
                    <div style="display: flex; justify-content: center; gap: 5px; background: #fff; padding: 10px; border-radius: 5px; width: fit-content; margin: 0 auto;">
                        <div id="reel-1" class="slot-reel">7</div>
                        <div id="reel-2" class="slot-reel">7</div>
                        <div id="reel-3" class="slot-reel">7</div>
                    </div>
                    
                    <div id="slot-message" style="margin-top: 20px; color: #0f0; font-family: monospace; font-size: 18px; text-shadow: 0 0 5px #0f0; height: 24px;">INSERT COIN</div>
                </div>

                <button id="slot-action-btn" class="main-btn" style="padding: 20px; font-size: 20px;">レバーON (10C)</button>
            </div>

            <div id="chinchiro-screen" class="hidden">
                <h1>🎲 チンチロ</h1>
                <div class="profile-bar">
                    <div>所持: 🪙 <span id="my-coins-game"></span> コイン</div>
                    <div style="font-size: 12px; color: #9ca3af;">(進行中: <span id="game-phase-text">待機室</span>)</div>
                </div>

                <div id="result-area" class="result-box hidden">
                    <div style="text-align: center; font-weight: bold; color: #ffd700; font-size: 20px; margin-bottom: 15px;">🏆 清算結果</div>
                    <div class="my-result-card">
                        <div id="my-vs-text" style="font-size: 14px; margin-bottom: 8px;"></div>
                        <div id="my-diff-text" style="font-size: 36px; font-weight: bold;"></div>
                    </div>
                    <div style="font-size: 12px; color: #9ca3af; margin-bottom: 5px;">全体の動き</div>
                    <div id="other-results-container"></div>
                </div>

                <div id="action-buttons-area" style="margin-bottom: 15px;">
                    <button class="danger-btn hidden" id="master-start-btn">ベットフェーズへ (マスター)</button>
                    <button class="blue-btn hidden" id="master-roll-phase-btn">ゲーム開始 (マスター)</button>
                    <button class="main-btn hidden" id="roll-dice-btn">サイコロを振る！</button>
                    <button class="blue-btn hidden" id="master-finish-btn">清算して次へ (マスター)</button>
                    <button class="main-btn" id="leave-table-btn" style="background-color: #3f4257; color: white;">卓を離れる</button>
                </div>

                <div id="betting-area" class="hidden" style="margin-bottom: 20px; background: #2d303f; padding: 15px; border-radius: 8px;">
                    <div id="bet-title-text" style="font-size: 16px; margin-bottom: 10px;">賭け金: <span id="current-bet-display" style="color: #ffd700; font-weight: bold; font-size: 20px;">0</span> コイン</div>
                    <div id="bet-controls" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
                        <button class="main-btn" onclick="addBet(100)" style="width: auto; padding: 8px 16px;">+100</button>
                        <button class="main-btn" onclick="addBet(1000)" style="width: auto; padding: 8px 16px;">+1000</button>
                        <button class="danger-btn" onclick="resetBet()" style="width: auto; padding: 8px 16px;">クリア</button>
                    </div>
                    <button class="blue-btn" onclick="confirmBet()" id="confirm-bet-btn">ベットを確定する</button>
                    <button class="danger-btn hidden" onclick="cancelBet()" id="cancel-bet-btn">キャンセルする</button>
                </div>

                else slotInternalHit = 'miss';

                if (slotInternalHit === '7') slotResult = [7, 7, 7];
                else if (slotInternalHit === 'normal') {
                    const n = [1,2,3,4,5,6,8,9][Math.floor(Math.random()*8)];
                    slotResult = [n, n, n];
                } else {
                    slotResult = [Math.floor(Math.random()*9)+1, Math.floor(Math.random()*9)+1, Math.floor(Math.random()*9)+1];
                    if (slotResult[0] === slotResult[1] && slotResult[1] === slotResult[2]) slotResult[2] = (slotResult[2] % 9) + 1;
                }

                if (slotInternalHit !== 'miss' && Math.random() < 0.25) peka();

                slotState = 1;
                btn.innerText = "左を止める";

                for(let i=0; i<3; i++) {
                    document.getElementById(`reel-${i+1}`).classList.add('rolling');
                    slotIntervals[i] = setInterval(() => {
                        document.getElementById(`reel-${i+1}`).innerText = Math.floor(Math.random()*9)+1;
                    }, 40);
                }
            } else if (slotState === 1) {
                stopReel(1, sndBt1);
                btn.innerText = "中を止める";
                slotState = 2;
            } else if (slotState === 2) {
                stopReel(2, sndBt2);
                btn.innerText = "右を止める";
                slotState = 3;
            } else if (slotState === 3) {
                stopReel(3, sndBt3);
                btn.innerText = `レバーON (${SLOT_BET}C)`;
                slotState = 0;
                checkSlotWin();
            }
        });

        function stopReel(index, sound) {
            clearInterval(slotIntervals[index-1]);
            const el = document.getElementById(`reel-${index}`);
            el.classList.remove('rolling');
            el.innerText = slotResult[index-1];
            if(slotResult[index-1] === 7) el.style.color = '#ef4444';
            else el.style.color = '#111';
            
            sound.currentTime = 0; sound.play().catch(()=>{});
            if (slotResult[index-1] === 4) { snd4.currentTime = 0; snd4.play().catch(()=>{}); }
            
            if (slotInternalHit !== 'miss' && Math.random() < 0.3 && document.getElementById('peka-lamp').style.background !== 'rgb(255, 0, 0)') {
                peka();
            }
        }

        async function checkSlotWin() {
            if (slotInternalHit !== 'miss' && document.getElementById('peka-lamp').style.background !== 'rgb(255, 0, 0)') peka();

            if (slotResult[0] === slotResult[1] && slotResult[1] === slotResult[2]) {
                let winCoins = (slotResult[0] === 7) ? 100 : 30; // ちびちび仕様
                document.getElementById('slot-message').innerText = (slotResult[0] === 7) ? `777! +${winCoins}C` : `WIN! +${winCoins}C`;

                const newCoins = myData.coins + winCoins;
                myData.coins = newCoins;
                updateCoinsUI();
                await update(ref(db, `users/${currentUserId}`), { coins: newCoins });
                if(currentRoomId) await update(ref(db, `rooms/${currentRoomId}/members/${currentUserId}`), { coins: newCoins });
            } else {
                document.getElementById('slot-message').innerText = 'LOSE...';
            }
        }


        // ==========================================
        // 🎲 チンチロ卓 ロジック
        // ==========================================
        document.getElementById('join-chinchiro-btn').addEventListener('click', async () => {
            const chSnap = await get(ref(db, `rooms/${currentRoomId}/chinchiro`));
            const cData = chSnap.val() || {}; const playersObj = cData.players || {};
            if(!playersObj[currentUserId]) {
                if(cData.status !== 'waiting') alert("ゲーム進行中のため観戦モードになります。");
                const myTableRef = ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`);
                await set(myTableRef, { bet: 0, isBetConfirmed: false, isRolling: false, yakuData: null, rollCount: 0 });
                onDisconnect(myTableRef).remove();
            }
        });

        document.getElementById('leave-table-btn').addEventListener('click', async () => {
            const canLeave = await attemptLeaveTable();
            if(canLeave) showScreen('room-lobby-screen');
        });

        function getStaticDiceTransform(num) {
            let fx=0, fy=0; switch(num){ case 1:break; case 2:fx=90;break; case 3:fy=-90;break; case 4:fy=90;break; case 5:fx=-90;break; case 6:fy=180;break; }
            return `rotateX(${fx}deg) rotateY(${fy}deg)`;
        }

        function resetDiceVisual() {
            [1,2,3].forEach(i => {
                const el = document.getElementById(`dice${i}-3d`);
                el.classList.remove('spinning'); el.style.transition = 'none';
                el.style.transform = getStaticDiceTransform(1);
                void el.offsetWidth; el.style.transition = 'transform 1.2s cubic-bezier(0.1, 0.9, 0.2, 1)';
            });
        }

        function renderChinchiroTable(chinchiroData, allMembers) {
            if (!chinchiroData) return;
            const tablePlayers = chinchiroData.players || {}; 
            const pList = Object.keys(tablePlayers).filter(uid => allMembers[uid]);

            isTableMaster = (chinchiroData.master === currentUserId);
            if (!pList.includes(chinchiroData.master) && pList.length > 0 && !isTableMaster) {
                if (pList[0] === currentUserId) update(ref(db, `rooms/${currentRoomId}/chinchiro`), { master: currentUserId, oya: currentUserId });
            }

            const status = chinchiroData.status; const turnOrder = chinchiroData.turnOrder || [];
            const currentTurnUid = turnOrder[chinchiroData.turnIndex]; const myPData = tablePlayers[currentUserId];

            document.getElementById('game-phase-text').innerText = status;
            ['master-start-btn', 'master-roll-phase-btn', 'master-finish-btn', 'roll-dice-btn', 'betting-area', 'dice-area', 'result-area'].forEach(id => document.getElementById(id).classList.add('hidden'));

            let mainMsg = "待機中...";
            if (status === 'waiting') {
                localTurnUid = null;
                if (isTableMaster && pList.length > 1) document.getElementById('master-start-btn').classList.remove('hidden');
                mainMsg = "参加者を待っています...";
                updateCoinsUI();
                document.getElementById('dice-area').classList.remove('hidden');
                resetDiceVisual(); 
            } 
            else if (status === 'betting') {
                localTurnUid = null;
                document.getElementById('betting-area').classList.remove('hidden');
                let allBetConfirmed = true;
                pList.forEach(uid => { if(uid !== chinchiroData.oya && !tablePlayers[uid].isBetConfirmed) allBetConfirmed = false; });
                
                if (isTableMaster && allBetConfirmed && pList.length > 1) document.getElementById('master-roll-phase-btn').classList.remove('hidden');
                
                if(chinchiroData.oya === currentUserId) {
                    mainMsg = "あなたは親です。子のベット完了を待っています...";
                    document.getElementById('bet-controls').classList.add('hidden');
                    document.getElementById('confirm-bet-btn').classList.add('hidden');
                    document.getElementById('cancel-bet-btn').classList.add('hidden');
                    document.getElementById('bet-title-text').innerText = "親はベットしません";
                } else {
                    mainMsg = "賭け金を決めてください";
                    document.getElementById('bet-title-text').innerHTML = `賭け金: <span id="current-bet-display" style="color: #ffd700; font-weight: bold; font-size: 20px;">${currentBet}</span> コイン`;
                    
                    if(myPData && myPData.isBetConfirmed) {
                        currentBet = myPData.bet || 0;
                        document.getElementById('current-bet-display').innerText = currentBet;
                        updateCoinsUI();
                        document.getElementById('confirm-bet-btn').classList.add('hidden');
                        document.getElementById('cancel-bet-btn').classList.remove('hidden');
                        document.getElementById('bet-controls').classList.add('hidden');
                    } else {
                        updateCoinsUI();
                        document.getElementById('confirm-bet-btn').classList.remove('hidden'); document.getElementById('confirm-bet-btn').disabled = false;
                        document.getElementById('cancel-bet-btn').classList.add('hidden');
                        document.getElementById('bet-controls').classList.remove('hidden');
                    }
                }
            }
            else if (status === 'playing') {
                document.getElementById('dice-area').classList.remove('hidden');
                
                if (localTurnUid !== currentTurnUid) {
                    localTurnUid = currentTurnUid;
                    resetDiceVisual();
                }

                const tName = allMembers[currentTurnUid] ? allMembers[currentTurnUid].name : '誰か';
                const rc = tablePlayers[currentTurnUid] ? tablePlayers[currentTurnUid].rollCount : 0;
                
                let diceToShow = [1, 1, 1];
                if (tablePlayers[currentTurnUid] && tablePlayers[currentTurnUid].finalDice) { diceToShow = tablePlayers[currentTurnUid].finalDice; } 
                else if (chinchiroData.lastDice) { diceToShow = chinchiroData.lastDice; } 

                if (tablePlayers[currentTurnUid] && tablePlayers[currentTurnUid].isRolling) {
                    mainMsg = `${tName} がサイコロを振っています...`;
                    [1,2,3].forEach(i => document.getElementById(`dice${i}-3d`).classList.add('spinning'));
                } else {
                    [1,2,3].forEach(i => {
                        const el = document.getElementById(`dice${i}-3d`);
                        el.classList.remove('spinning'); el.style.transition = 'none';
                        el.style.transform = getStaticDiceTransform(diceToShow[i-1]);
                        void el.offsetWidth; el.style.transition = 'transform 1.2s cubic-bezier(0.1, 0.9, 0.2, 1)';
                    });

                    if (currentTurnUid === currentUserId) {
                        if(myPData.yakuData) {
                            if (chinchiroData.turnIndex + 1 >= chinchiroData.turnOrder.length) mainMsg = `役が確定しました！ゲームを終了します...`;
                            else mainMsg = `役が確定しました！次の人に渡します...`;
                        } else {
                            document.getElementById('roll-dice-btn').classList.remove('hidden');
                            if(rc === 0) { mainMsg = `あなたのターンです！<br>(1回目 / 最大3回)`; document.getElementById('roll-dice-btn').innerText = "サイコロを振る！"; } 
                            else if (rc < 3) { mainMsg = `出目なし！もう一度振ってください<br>(残り ${3-rc} 回)`; document.getElementById('roll-dice-btn').innerText = "もう一度振る！"; }
                        }
                    } else { 
                        if(tablePlayers[currentTurnUid] && tablePlayers[currentTurnUid].yakuData) {
                            if (chinchiroData.turnIndex + 1 >= chinchiroData.turnOrder.length) mainMsg = `${tName} が役を確定させました！`;
                            else mainMsg = `${tName} の役が確定しました！`;
                        }
                        else mainMsg = `${tName} のターン (残り ${3 - rc} 回)`; 
                    }
                }
            }
            else if (status === 'payout') {
                mainMsg = "ゲーム終了！";
                document.getElementById('result-area').classList.remove('hidden');
                if (isTableMaster) document.getElementById('master-finish-btn').classList.remove('hidden');

                const resData = chinchiroData.resultData;
                if(resData) {
                    const isOya = (currentUserId === resData.oyaId);
                    let myDiff = resData.myDiffs[currentUserId] || 0;
                    
                    let vsText = "";
                    if (isOya) vsText = `親 (${resData.oyaYaku}) としての総収支`;
                    else vsText = `子 (${resData.playerYakus[currentUserId] || "不明"}) VS 親 (${resData.oyaYaku})`;

                    let diffText = ""; let diffClass = "";
                    if (myDiff > 0) { diffText = `+${myDiff} 🪙`; diffClass = "win-text"; }
                    else if (myDiff < 0) { diffText = `${myDiff} 🪙`; diffClass = "lose-text"; }
                    else { diffText = `±0 🪙`; diffClass = "draw-text"; }

                    document.getElementById('my-vs-text').innerText = vsText;
                    const diffEl = document.getElementById('my-diff-text');
                    diffEl.innerText = diffText; diffEl.className = diffClass;
                    diffEl.style.animation = 'none'; void diffEl.offsetWidth; diffEl.style.animation = 'popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

                    const othersDiv = document.getElementById('other-results-container');
                    othersDiv.innerHTML = '';
                    for (const uid in resData.myDiffs) {
                        if (uid === currentUserId) continue; 
                        const name = allMembers[uid] ? allMembers[uid].name : "不明";
                        const yaku = resData.playerYakus[uid] || "抜けたプレイヤー";
                        const diff = resData.myDiffs[uid];
                        let dTxt = diff > 0 ? `+${diff}` : (diff < 0 ? `${diff}` : "±0");
                        let dCol = diff > 0 ? "#10b981" : (diff < 0 ? "#ef4444" : "#9ca3af");
                        othersDiv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:4px; border-bottom:1px solid #3f4257; padding-bottom:4px;">
                            <span>${name} <span style="font-size:10px; color:#9ca3af;">(${yaku})</span></span>
                            <span style="color:${dCol}; font-weight:bold;">${dTxt} 🪙</span>
                        </div>`;
                    }
                }
            }

            document.getElementById('game-status-text').innerHTML = mainMsg;

            const usersDiv = document.getElementById('table-players'); usersDiv.innerHTML = '';
            for (const uid of pList) {
                const uData = allMembers[uid]; const pData = tablePlayers[uid]; if(!uData) continue;
                let badges = "";
                if (uid === chinchiroData.master) badges += `<span class="badge bg-host">マスター</span> `;
                if (uid === chinchiroData.oya) badges += `<span class="badge bg-oya">親</span> `;
                if (status === 'playing' && uid === currentTurnUid) badges += `<span class="badge bg-turn">ターン</span> `;

                let st = "";
                let listCoins = uData.coins;
                if (status !== 'waiting' && status !== 'payout' && pData.isBetConfirmed && uid !== chinchiroData.oya) { listCoins -= pData.bet; }

                if (status === 'betting' && uid !== chinchiroData.oya) st = pData.isBetConfirmed ? `<span class="badge bg-done">ベット完了 (${pData.bet}C)</span>` : "考え中...";
                else if (status === 'playing' || status === 'payout') st = pData.yakuData ? `<span style="color:#10b981;">${pData.yakuData.name}</span>` : "順番待ち";
                
                usersDiv.innerHTML += `<div class="list-item"><span>${uData.emoji}</span> <span>${uData.name}</span> ${badges} 
                                       <span style="margin-left:auto; display:flex; align-items:center; gap:10px;">
                                            <span style="font-weight:bold;">${st}</span>
                                            <span style="font-size:12px; color:#ffd700;">🪙${listCoins}</span>
                                       </span></div>`;
            }
        }

        document.getElementById('master-start-btn').addEventListener('click', () => {
            update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'betting', resultData: null });
            get(ref(db, `rooms/${currentRoomId}/chinchiro/players`)).then(snap => { snap.forEach(c => update(c.ref, { bet: 0, isBetConfirmed: false, rollCount: 0, yakuData: null, finalDice: null })); });
            resetBet();
        });

        document.getElementById('master-roll-phase-btn').addEventListener('click', async () => {
            const snap = await get(ref(db, `rooms/${currentRoomId}/chinchiro`));
            const cData = snap.val();
            const roomMembersSnap = await get(ref(db, `rooms/${currentRoomId}/members`));
            const activeMembers = roomMembersSnap.val() || {};
            
            let order = Object.keys(cData.players || {}).filter(u => u !== cData.oya && activeMembers[u]); 
            if(activeMembers[cData.oya]) order.push(cData.oya);
            
            let updates = {};
            updates[`rooms/${currentRoomId}/chinchiro/status`] = 'playing';
            updates[`rooms/${currentRoomId}/chinchiro/turnOrder`] = order;
            updates[`rooms/${currentRoomId}/chinchiro/turnIndex`] = 0;
            updates[`rooms/${currentRoomId}/chinchiro/lastDice`] = null; 
            order.forEach(uid => {
                updates[`rooms/${currentRoomId}/chinchiro/players/${uid}/rollCount`] = 0;
                updates[`rooms/${currentRoomId}/chinchiro/players/${uid}/yakuData`] = null;
                updates[`rooms/${currentRoomId}/chinchiro/players/${uid}/finalDice`] = null;
                updates[`rooms/${currentRoomId}/chinchiro/players/${uid}/isRolling`] = false;
            });
            await update(ref(db), updates);
        });

        document.getElementById('master-finish-btn').addEventListener('click', async () => {
            const snap = await get(ref(db, `rooms/${currentRoomId}`));
            const data = snap.val();
            const activeMembers = data.members || {};
            
            const pList = Object.keys(data.chinchiro.players).filter(u => activeMembers[u]);
            let nextOya = data.chinchiro.oya;
            if(pList.length > 0) {
                const currentOyaIdx = pList.indexOf(data.chinchiro.oya);
                nextOya = pList[(currentOyaIdx + 1) % pList.length];
            }

            update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'waiting', oya: nextOya });
            get(ref(db, `rooms/${currentRoomId}/chinchiro/players`)).then(s => { s.forEach(c => update(c.ref, { yakuData: null, isRolling: false, finalDice: null })); });
            resetBet();
        });

        window.addBet = (amt) => { currentBet += amt; if (currentBet > myData.coins) currentBet = myData.coins; document.getElementById('current-bet-display').innerText = currentBet; updateCoinsUI(); };
        window.resetBet = () => { currentBet = 0; document.getElementById('current-bet-display').innerText = currentBet; updateCoinsUI(); };
        window.confirmBet = async () => {
            if (currentBet <= 0) return alert("100以上ベットしてください！");
            await update(ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`), { bet: currentBet, isBetConfirmed: true });
        };
        window.cancelBet = async () => { await update(ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`), { isBetConfirmed: false }); };

        function evaluateYaku(d1, d2, d3) {
            const d = [d1, d2, d3].sort((a, b) => a - b); const s = d.join('');
            
            if (s === '111') return { name: `ピンゾロ`, rank: 4, multiplier: 5, score: 7 }; 
            if (d[0]===d[1] && d[1]===d[2]) return { name: `${d[0]}のゾロ目`, rank: 3, multiplier: 3, score: d[0] };
            if (s === '456') return { name: `シゴロ`, rank: 2, multiplier: 2, score: 0 };
            if (s === '123') return { name: `ヒフミ`, rank: -1, multiplier: -2, score: 0 };
            
            let normalScore = 0;
            if (d[0]===d[1]) normalScore = d[2]; else if (d[1]===d[2]) normalScore = d[0]; else if (d[0]===d[2]) normalScore = d[1];
            if (normalScore > 0) return { name: `${normalScore}の目`, rank: 1, multiplier: 2, score: normalScore };

            return { name: `目無し`, rank: 0, multiplier: 0, score: 0 };
        }

        document.getElementById('roll-dice-btn').addEventListener('click', async () => {
            const pRef = ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`);
            document.getElementById('roll-dice-btn').classList.add('hidden');
            await update(pRef, { isRolling: true });

            setTimeout(async () => {
                const d1 = Math.floor(Math.random() * 6)+1, d2 = Math.floor(Math.random() * 6)+1, d3 = Math.floor(Math.random() * 6)+1;
                const yaku = evaluateYaku(d1, d2, d3);
                const chSnap = await get(ref(db, `rooms/${currentRoomId}/chinchiro`));
                const cData = chSnap.val();
                const newCount = cData.players[currentUserId].rollCount + 1;

                let turnEnds = false;
                if (yaku.rank !== 0 || newCount >= 3) turnEnds = true;
                
                await update(pRef, { isRolling: false, finalDice: [d1,d2,d3], rollCount: newCount });
                await update(ref(db, `rooms/${currentRoomId}/chinchiro`), { lastDice: [d1, d2, d3] });

                if (turnEnds) {
                    await update(pRef, { yakuData: yaku });
                    setTimeout(async () => {
                        const currentChSnap = await get(ref(db, `rooms/${currentRoomId}/chinchiro`));
                        if (currentChSnap.val().turnIndex + 1 >= currentChSnap.val().turnOrder.length) {
                            const finalRoomSnap = await get(ref(db, `rooms/${currentRoomId}`));
                            calculateAndApplyPayout(finalRoomSnap.val());
                        } else {
                            update(ref(db, `rooms/${currentRoomId}/chinchiro`), { turnIndex: currentChSnap.val().turnIndex + 1 });
                        }
                    }, 3000);
                } else {
                    document.getElementById('roll-dice-btn').classList.remove('hidden');
                }
            }, 1000); 
        });

        async function calculateAndApplyPayout(rData) {
            const members = rData.members; const cData = rData.chinchiro;
            const oyaUid = cData.oya; const oyaYaku = cData.players[oyaUid].yakuData;
            const oyaName = members[oyaUid].name;
            
            let updates = {}; 
            let resData = { oyaId: oyaUid, oyaName: oyaName, oyaYaku: oyaYaku.name, myDiffs: {}, playerYakus: {} };
            
            for (let uid in cData.players) {
                if(members[uid]) {
                    resData.myDiffs[uid] = 0;
                    resData.playerYakus[uid] = cData.players[uid].yakuData ? cData.players[uid].yakuData.name : "不明";
                }
            }
            for (let uid in members) updates[`rooms/${currentRoomId}/members/${uid}/coins`] = members[uid].coins;

            for (let uid in cData.players) {
                if (uid === oyaUid) continue;
                if (!members[uid]) continue;
                const p = cData.players[uid]; const pYaku = p.yakuData; const bet = p.bet;
                let diff = 0;

                if (pYaku.rank === -1) { diff = -bet * 2; }
                else if (oyaYaku.rank === -1) { diff = bet * 2; }
                else if (pYaku.rank === 0) { diff = -bet; }
                else if (oyaYaku.rank === 0) { diff = bet; }
                else {
                    if (pYaku.rank > oyaYaku.rank || (pYaku.rank === oyaYaku.rank && pYaku.score > oyaYaku.score)) {
                        diff = bet * pYaku.multiplier;
                    } else if (oyaYaku.rank > pYaku.rank || (oyaYaku.rank === pYaku.rank && oyaYaku.score > pYaku.score)) {
                        diff = -bet;
                    }
                }
                
                updates[`rooms/${currentRoomId}/members/${uid}/coins`] += diff;
                resData.myDiffs[uid] += diff;
                updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] -= diff;
                resData.myDiffs[oyaUid] -= diff;
            }
            
            updates[`rooms/${currentRoomId}/chinchiro/resultData`] = resData;
            updates[`rooms/${currentRoomId}/chinchiro/status`] = 'payout';
            await update(ref(db), updates);

            const myNewCoins = updates[`rooms/${currentRoomId}/members/${currentUserId}/coins`];
            if(myNewCoins !== undefined) { myData.coins = myNewCoins; document.getElementById('my-coins-home').innerText = myNewCoins; document.getElementById('my-coins-game').innerText = myNewCoins; update(ref(db, `users/${currentUserId}`), { coins: myNewCoins }); }
        }
    </script>

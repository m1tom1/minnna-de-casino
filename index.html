<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボードゲーム・カジノ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1c23; color: #f3f4f6; margin: 0; padding: 0; }
        
        /* グローバルヘッダー */
        #global-header-bar { position: fixed; top: 0; left: 0; width: 100%; background: #2d3142; padding: 10px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffd700; z-index: 1000; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .header-left { font-weight: bold; }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .sm-btn { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .sm-btn:hover { background: #2563eb; }
        .vol-btn { background: #4b5563; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .danger-bg { background: #ef4444 !important; } .danger-bg:hover { background: #dc2626 !important; }

        /* メインコンテンツ */
        .main-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding-top: 60px; box-sizing: border-box; }
        .container { background-color: #242631; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 500px; text-align: center; }
        
        h1 { color: #ffd700; margin-bottom: 24px; font-size: 24px; }
        .hidden { display: none !important; }
        
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #3f4257; background-color: #1a1c23; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; }
        
        /* ボタン類 */
        button.main-btn { background-color: #ffd700; color: #1a1c23; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button.main-btn:hover { background-color: #e6c200; }
        button.main-btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        button.danger-btn { background-color: #ef4444; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button.danger-btn:hover { background-color: #dc2626; }
        button.blue-btn { background-color: #3b82f6; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button.blue-btn:hover { background-color: #2563eb; }
        
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
        .emoji-btn { font-size: 30px; background: #1a1c23; border: 2px solid #3f4257; border-radius: 8px; cursor: pointer; padding: 8px; transition: 0.2s; }
        .emoji-btn.selected { border-color: #ffd700; background-color: #2d3142; transform: scale(1.05); }
        .profile-bar { background: #1a1c23; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 4px solid #ffd700; }
        
        .section-title { font-size: 14px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; margin-top: 16px; text-align: left; }
        .user-list { background: #1a1c23; border-radius: 8px; padding: 10px; min-height: 50px; text-align: left; margin-bottom: 20px; }
        .list-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #2d303f; }
        .badge { color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .bg-host { background: #3f4257; } .bg-oya { background: #ef4444; } .bg-turn { background: #10b981; } .bg-done { background: #3b82f6; }
        
        .game-card { background: #1a1c23; border: 1px solid #3f4257; border-radius: 8px; padding: 15px; text-align: left; margin-bottom: 15px; }
        .game-card h3 { margin: 0 0 10px 0; color: #fff; }
        
        /* 3Dサイコロ */
        .dice-area { display: flex; justify-content: center; gap: 20px; margin: 30px 0; perspective: 600px; }
        .dice-3d { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .face { position: absolute; width: 60px; height: 60px; background: #f8f9fa; border-radius: 8px; box-shadow: inset 0 0 15px rgba(0,0,0,0.1), 0 0 2px rgba(0,0,0,0.2); display: grid; grid-template-areas: "a b c" "d e f" "g h i"; padding: 10px; box-sizing: border-box; }
        .dot { width: 12px; height: 12px; background: #1f2937; border-radius: 50%; box-shadow: inset 0 3px 5px rgba(0,0,0,0.5), 0 1px 1px rgba(255,255,255,0.8); justify-self: center; align-self: center; }
        .front .dot-center { background: #ef4444; width: 16px; height: 16px; }
        .dot-center { grid-area: e; } .dot-top-left { grid-area: a; } .dot-top-right { grid-area: c; } .dot-middle-left { grid-area: d; } .dot-middle-right { grid-area: f; } .dot-bottom-left { grid-area: g; } .dot-bottom-right { grid-area: i; }
        .front  { transform: translateZ(30px); } .back   { transform: rotateY(180deg) translateZ(30px); } .right  { transform: rotateY(90deg) translateZ(30px); } .left   { transform: rotateY(-90deg) translateZ(30px); } .top    { transform: rotateX(90deg) translateZ(30px); } .bottom { transform: rotateX(-90deg) translateZ(30px); }
    </style>
</head>
<body>

    <audio id="bgm-audio" src="jazz_bgm.mp3" loop></audio>

    <div id="global-header-bar">
        <div class="header-left">
            <span id="hdr-logo">🎲 カジノゲート</span>
            <span id="hdr-room-info" class="hidden">🏠 Room: <span id="hdr-room-code" style="color: #ffd700; font-weight: bold;"></span></span>
        </div>
        <div class="header-controls">
            <div style="display:flex; align-items:center; gap:5px;">
                <span style="font-size: 16px;">🎵</span>
                <button class="vol-btn" onclick="changeVol(-0.1)">-</button>
                <span id="vol-disp" style="width: 20px; text-align: center; font-weight: bold;">1</span>
                <button class="vol-btn" onclick="changeVol(0.1)">+</button>
            </div>
            <button id="hdr-copy-btn" class="sm-btn hidden" onclick="copyInviteUrl()">URLコピー 🔗</button>
            <button id="hdr-leave-btn" class="sm-btn danger-bg hidden" onclick="leaveRoomEntirely()">退出 🚪</button>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="container">
            <div id="login-screen">
                <h1>入場手続き</h1>
                <input type="text" id="username" placeholder="名前を入力" maxlength="10">
                <div class="emoji-grid">
                    <button class="emoji-btn" onclick="selectEmoji('🐱')">🐱</button>
                    <button class="emoji-btn" onclick="selectEmoji('🕶️')">🕶️</button>
                    <button class="emoji-btn" onclick="selectEmoji('🎲')">🎲</button>
                    <button class="emoji-btn" onclick="selectEmoji('🦊')">🦊</button>
                </div>
                <button class="main-btn" id="login-btn">決定</button>
            </div>

            <div id="home-screen" class="hidden">
                <h1>ホーム</h1>
                <div class="profile-bar">
                    <div><span id="my-emoji"></span> <span id="my-name"></span></div>
                    <div style="color: #ffd700;">🪙 <span id="my-coins-home"></span> コイン</div>
                </div>
                <button class="main-btn" id="create-room-btn">🌟 新しく部屋を作る</button>
                <div class="section-title">合言葉で参加</div>
                <input type="text" id="room-code-input" placeholder="部屋コードを入力">
                <button class="main-btn" id="join-room-btn" style="background-color: #3b82f6; color: white;">入室する</button>
            </div>

            <div id="room-lobby-screen" class="hidden">
                <h1>ルームロビー</h1>
                <div class="section-title">部屋にいるメンバー</div>
                <div class="user-list" id="room-members-list"></div>

                <div class="section-title">遊べるゲーム卓</div>
                <div class="game-card">
                    <h3>🎲 チンチロ</h3>
                    <p style="font-size: 12px; color: #9ca3af;" id="chinchiro-status-text">待機中 (0人)</p>
                    <button class="main-btn" id="join-chinchiro-btn" style="padding: 10px;">卓に参加する</button>
                </div>
            </div>

            <div id="chinchiro-screen" class="hidden">
                <h1>🎲 チンチロ卓</h1>
                <div class="profile-bar">
                    <div>所持: 🪙 <span id="my-coins-game"></span> コイン</div>
                    <div style="font-size: 12px; color: #9ca3af;">(進行中: <span id="game-phase-text">待機室</span>)</div>
                </div>

                <div id="betting-area" class="hidden" style="margin-bottom: 20px; background: #2d303f; padding: 15px; border-radius: 8px;">
                    <div style="font-size: 16px; margin-bottom: 10px;">賭け金: <span id="current-bet-display" style="color: #ffd700; font-weight: bold; font-size: 20px;">0</span> コイン</div>
                    
                    <div id="bet-controls" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
                        <button class="main-btn" onclick="addBet(100)" style="width: auto; padding: 8px 16px;">+100</button>
                        <button class="main-btn" onclick="addBet(1000)" style="width: auto; padding: 8px 16px;">+1000</button>
                        <button class="danger-btn" onclick="resetBet()" style="width: auto; padding: 8px 16px;">クリア</button>
                    </div>
                    
                    <button class="main-btn" onclick="confirmBet()" id="confirm-bet-btn">ベットを確定する</button>
                    <button class="danger-btn hidden" onclick="cancelBet()" id="cancel-bet-btn">キャンセルする</button>
                </div>

                <div class="dice-area hidden" id="dice-area">
                    <div class="dice-3d" id="dice1-3d"><div class="face front"><div class="dot dot-center"></div></div><div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div><div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div><div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div></div>
                    <div class="dice-3d" id="dice2-3d"><div class="face front"><div class="dot dot-center"></div></div><div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div><div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div><div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div></div>
                    <div class="dice-3d" id="dice3-3d"><div class="face front"><div class="dot dot-center"></div></div><div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div><div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div><div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div></div>
                </div>

                <div id="game-status-text" style="font-size: 18px; font-weight: bold; color: #ffd700; margin-bottom: 20px;"></div>
                <div class="section-title">卓のメンバー</div>
                <div class="user-list" id="table-players" style="font-size: 14px;"></div>

                <button class="danger-btn hidden" id="master-start-btn">ベットフェーズへ (マスター)</button>
                <button class="blue-btn hidden" id="master-roll-phase-btn">ゲーム開始 (マスター)</button>
                <button class="main-btn hidden" id="roll-dice-btn">サイコロを振る！</button>
                <button class="main-btn hidden" id="master-finish-btn">清算して待機室に戻る (マスター)</button>
                <button class="main-btn" id="leave-table-btn" style="background-color: #3f4257; color: white;">卓を離れる</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFGxRrxG104_Dw2XTXiQwIJ0KsVxkM42w",
            authDomain: "minnna-de-casino.firebaseapp.com",
            databaseURL: "https://minnna-de-casino-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "minnna-de-casino",
            storageBucket: "minnna-de-casino.firebasestorage.app",
            messagingSenderId: "246754430160",
            appId: "1:246754430160:web:9907c3159c2003c6aba2d5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let myData = { emoji: '🐱', name: '', coins: 1000 };
        let currentUserId = null;
        let currentRoomId = null;
        let isTableMaster = false;
        let currentBet = 0;
        let unsubscribeRoom = null;

        // サイコロのアニメーションが巻き戻らないようにするための絶対角度トラッカー
        let globalDiceSpinsX = {1: 0, 2: 0, 3: 0};
        let globalDiceSpinsY = {1: 0, 2: 0, 3: 0};

        // --- BGMと音量設定 ---
        const bgm = document.getElementById('bgm-audio');
        let savedVol = localStorage.getItem('bgmVolume');
        let currentVol = savedVol !== null ? parseFloat(savedVol) : 0.1;
        bgm.volume = currentVol;
        document.getElementById('vol-disp').innerText = Math.round(currentVol * 10);
        document.body.addEventListener('click', () => { if(bgm.paused) bgm.play().catch(()=>{}); }, {once: true});
        
        window.changeVol = (amt) => {
            let v = bgm.volume + amt;
            if(v > 1) v = 1; if(v < 0.05) v = 0;
            bgm.volume = v;
            localStorage.setItem('bgmVolume', v);
            document.getElementById('vol-disp').innerText = Math.round(v * 10);
        };

        window.selectEmoji = (e) => { myData.emoji = e; document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('selected', b.innerText === e)); }
        function showScreen(id) { ['login-screen', 'home-screen', 'room-lobby-screen', 'chinchiro-screen'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        
        function updateHeaderUI() {
            if (currentRoomId) {
                document.getElementById('hdr-logo').classList.add('hidden');
                document.getElementById('hdr-room-info').classList.remove('hidden');
                document.getElementById('hdr-copy-btn').classList.remove('hidden');
                document.getElementById('hdr-leave-btn').classList.remove('hidden');
                document.getElementById('hdr-room-code').innerText = currentRoomId;
            } else {
                document.getElementById('hdr-logo').classList.remove('hidden');
                document.getElementById('hdr-room-info').classList.add('hidden');
                document.getElementById('hdr-copy-btn').classList.add('hidden');
                document.getElementById('hdr-leave-btn').classList.add('hidden');
            }
        }

        window.copyInviteUrl = () => { navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?room=${currentRoomId}`); alert("URLをコピーしました！"); };
        
        window.leaveRoomEntirely = async () => {
            if(confirm("部屋から退出しますか？")) {
                if (currentRoomId && currentUserId) {
                    await remove(ref(db, `rooms/${currentRoomId}/members/${currentUserId}`));
                    await remove(ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`));
                }
                window.location.href = window.location.pathname; 
            }
        };

        // --- ログイン ---
        async function init() {
            const savedName = localStorage.getItem('casinoName');
            const savedEmoji = localStorage.getItem('casinoEmoji');
            const urlParams = new URLSearchParams(window.location.search);
            const inviteRoom = urlParams.get('room');
            if (savedName) {
                document.getElementById('username').value = savedName; selectEmoji(savedEmoji || '🐱');
                await performLogin(savedName, savedEmoji || '🐱', inviteRoom);
            } else { selectEmoji('🐱'); }
        }
        init();

        document.getElementById('login-btn').addEventListener('click', async () => {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert('名前を入力してください！');
            localStorage.setItem('casinoName', name); localStorage.setItem('casinoEmoji', myData.emoji);
            const urlParams = new URLSearchParams(window.location.search);
            await performLogin(name, myData.emoji, urlParams.get('room'));
        });

        async function performLogin(name, emoji, inviteRoomId) {
            const btn = document.getElementById('login-btn');
            if(btn) { btn.disabled = true; btn.innerText = "ログイン中..."; }
            myData.name = name; myData.emoji = emoji;
            try {
                const userCredential = await signInAnonymously(auth);
                currentUserId = userCredential.user.uid;
                const userRef = ref(db, `users/${currentUserId}`);
                const snapshot = await get(userRef);
                if (snapshot.exists()) myData.coins = snapshot.val().coins; else await set(userRef, myData);
                document.getElementById('my-name').innerText = myData.name; document.getElementById('my-emoji').innerText = myData.emoji;
                document.getElementById('my-coins-home').innerText = myData.coins; document.getElementById('my-coins-game').innerText = myData.coins;
                if (inviteRoomId) joinRoom(inviteRoomId); else showScreen('home-screen');
            } catch(e) { alert("ログインエラー"); }
            if(btn) { btn.disabled = false; btn.innerText = "決定"; }
        }

        // --- 部屋 ---
        document.getElementById('create-room-btn').addEventListener('click', async () => {
            const roomId = Math.random().toString(36).substring(2, 6).toUpperCase();
            await set(ref(db, `rooms/${roomId}`), { createdAt: Date.now(), chinchiro: { status: 'waiting', master: currentUserId, oya: currentUserId, players: { "dummy": true } } });
            await remove(ref(db, `rooms/${roomId}/chinchiro/players/dummy`));
            joinRoom(roomId);
        });

        document.getElementById('join-room-btn').addEventListener('click', () => {
            const r = document.getElementById('room-code-input').value.toUpperCase(); if(r) joinRoom(r);
        });

        async function joinRoom(roomId) {
            const roomSnap = await get(ref(db, `rooms/${roomId}`));
            if (!roomSnap.exists()) { window.history.replaceState({}, '', window.location.pathname); return alert("部屋が見つかりません！"); }
            currentRoomId = roomId; updateHeaderUI();
            const url = new URL(window.location.href); url.searchParams.set('room', roomId); window.history.replaceState({}, '', url);
            const myRoomRef = ref(db, `rooms/${roomId}/members/${currentUserId}`);
            await set(myRoomRef, myData); onDisconnect(myRoomRef).remove();
            startRoomListener(roomId);
        }

        function startRoomListener(roomId) {
            if (unsubscribeRoom) unsubscribeRoom();
            unsubscribeRoom = onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) { alert("解散されました"); window.location.href = window.location.pathname; return; }
                renderRoomLobby(data);
                const chin = data.chinchiro || { players: {} }; const pList = Object.keys(chin.players || {});
                if (pList.includes(currentUserId)) { showScreen('chinchiro-screen'); renderChinchiroTable(chin, data.members); } 
                else { showScreen('room-lobby-screen'); }
            });
        }

        function renderRoomLobby(data) {
            const members = data.members || {}; const listDiv = document.getElementById('room-members-list'); listDiv.innerHTML = '';
            for (const [uid, user] of Object.entries(members)) listDiv.innerHTML += `<div class="list-item"><span>${user.emoji}</span> <span>${user.name}</span> <span style="margin-left:auto">🪙${user.coins}</span></div>`;
            const chin = data.chinchiro || { status: 'waiting', players: {} }; const playersObj = chin.players || {};
            document.getElementById('chinchiro-status-text').innerText = `${chin.status === 'waiting' ? '待機中' : '進行中'} (${Object.keys(playersObj).length}人)`;
            const amIPlaying = !!playersObj[currentUserId];
            document.getElementById('join-chinchiro-btn').innerText = amIPlaying ? "卓に戻る" : ((chin.status !== 'waiting') ? "観戦する" : "卓に参加する");
        }

        // --- チンチロ卓 ---
        document.getElementById('join-chinchiro-btn').addEventListener('click', async () => {
            const chSnap = await get(ref(db, `rooms/${currentRoomId}/chinchiro`));
            const cData = chSnap.val() || {}; const playersObj = cData.players || {};
            if(!playersObj[currentUserId]) {
                if(cData.status !== 'waiting') alert("ゲーム進行中のため観戦モードになります。");
                const myTableRef = ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`);
                await set(myTableRef, { bet: 0, isBetConfirmed: false, isRolling: false, yakuData: null, rollCount: 0 });
                onDisconnect(myTableRef).remove();
            }
        });

        document.getElementById('leave-table-btn').addEventListener('click', async () => { await remove(ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`)); });

        function renderChinchiroTable(chinchiroData, allMembers) {
            if (!chinchiroData) return;
            const tablePlayers = chinchiroData.players || {}; const pList = Object.keys(tablePlayers);
            isTableMaster = (chinchiroData.master === currentUserId);
            if (!pList.includes(chinchiroData.master) && pList.length > 0 && !isTableMaster) {
                if (pList[0] === currentUserId) update(ref(db, `rooms/${currentRoomId}/chinchiro`), { master: currentUserId, oya: currentUserId });
            }

            const status = chinchiroData.status; const turnOrder = chinchiroData.turnOrder || [];
            const currentTurnUid = turnOrder[chinchiroData.turnIndex]; const myPData = tablePlayers[currentUserId];

            document.getElementById('game-phase-text').innerText = status;
            ['master-start-btn', 'master-roll-phase-btn', 'master-finish-btn', 'roll-dice-btn', 'betting-area', 'dice-area'].forEach(id => document.getElementById(id).classList.add('hidden'));

            let mainMsg = "待機中...";
            if (status === 'waiting') {
                if (isTableMaster && pList.length > 1) document.getElementById('master-start-btn').classList.remove('hidden');
                mainMsg = "参加者を待っています...";
                // リロード時の表示ズレ対策
                document.getElementById('my-coins-game').innerText = myData.coins;
            } 
            else if (status === 'betting') {
                document.getElementById('betting-area').classList.remove('hidden');
                let allBetConfirmed = true;
                pList.forEach(uid => { if(uid !== chinchiroData.oya && !tablePlayers[uid].isBetConfirmed) allBetConfirmed = false; });
                
                if (isTableMaster && allBetConfirmed && pList.length > 1) document.getElementById('master-roll-phase-btn').classList.remove('hidden');
                mainMsg = "賭け金を決めてください";
                
                // リロード時のベット状態復元
                if(myPData && myPData.isBetConfirmed) {
                    currentBet = myPData.bet || 0;
                    document.getElementById('current-bet-display').innerText = currentBet;
                    document.getElementById('my-coins-game').innerText = myData.coins - currentBet;
                    
                    document.getElementById('confirm-bet-btn').classList.add('hidden');
                    document.getElementById('cancel-bet-btn').classList.remove('hidden');
                    document.getElementById('bet-controls').classList.add('hidden'); // ボタン隠す
                } else {
                    document.getElementById('my-coins-game').innerText = myData.coins - currentBet;
                    
                    document.getElementById('confirm-bet-btn').classList.remove('hidden'); document.getElementById('confirm-bet-btn').disabled = false;
                    document.getElementById('cancel-bet-btn').classList.add('hidden');
                    document.getElementById('bet-controls').classList.remove('hidden');
                }
            }
            else if (status === 'playing') {
                document.getElementById('dice-area').classList.remove('hidden');
                const tName = allMembers[currentTurnUid] ? allMembers[currentTurnUid].name : '誰か';
                const rc = tablePlayers[currentTurnUid] ? tablePlayers[currentTurnUid].rollCount : 0;
                
                if (currentTurnUid === currentUserId) {
                    document.getElementById('roll-dice-btn').classList.remove('hidden');
                    if(rc === 0) { mainMsg = `あなたのターンです！ (残り3回)`; document.getElementById('roll-dice-btn').innerText = "サイコロを振る！"; } 
                    else if (rc < 3 && !tablePlayers[currentTurnUid].isRolling) { mainMsg = `出目なし！もう一度振ってください (残り ${3-rc} 回)`; document.getElementById('roll-dice-btn').innerText = "もう一度振る！"; }
                } else { mainMsg = `${tName} のターン (残り ${3 - rc} 回)`; }

                if (tablePlayers[currentTurnUid] && tablePlayers[currentTurnUid].isRolling) {
                    mainMsg = `${tName} がサイコロを振っています...`;
                } else if (tablePlayers[currentTurnUid] && tablePlayers[currentTurnUid].finalDice) {
                    // ここでは角度変更は行わず、roll3DDiceで固定した角度を維持する
                }
            }
            else if (status === 'payout') {
                mainMsg = "結果発表！マスターが清算します";
                if (isTableMaster) document.getElementById('master-finish-btn').classList.remove('hidden');
            }

            document.getElementById('game-status-text').innerText = mainMsg;

            const usersDiv = document.getElementById('table-players'); usersDiv.innerHTML = '';
            for (const uid of pList) {
                const uData = allMembers[uid]; const pData = tablePlayers[uid]; if(!uData) continue;
                let badges = "";
                if (uid === chinchiroData.master) badges += `<span class="badge bg-host">マスター</span> `;
                if (uid === chinchiroData.oya) badges += `<span class="badge bg-oya">親</span> `;
                if (status === 'playing' && uid === currentTurnUid) badges += `<span class="badge bg-turn">ターン</span> `;

                let st = "";
                if (status === 'betting' && uid !== chinchiroData.oya) st = pData.isBetConfirmed ? `<span class="badge bg-done">ベット完了 (${pData.bet} コイン)</span>` : "考え中...";
                else if (status === 'playing' || status === 'payout') st = pData.yakuData ? `<span style="color:#10b981;">${pData.yakuData.name}</span>` : "順番待ち";
                usersDiv.innerHTML += `<div class="list-item"><span>${uData.emoji}</span> <span>${uData.name}</span> ${badges} <span style="margin-left:auto; font-weight:bold;">${st}</span></div>`;
            }
        }

        // --- マスター進行 ---
        document.getElementById('master-start-btn').addEventListener('click', () => {
            update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'betting' });
            get(ref(db, `rooms/${currentRoomId}/chinchiro/players`)).then(snap => { snap.forEach(c => update(c.ref, { bet: 0, isBetConfirmed: false, rollCount: 0, yakuData: null, finalDice: null })); });
            resetBet();
        });

        document.getElementById('master-roll-phase-btn').addEventListener('click', async () => {
            const snap = await get(ref(db, `rooms/${currentRoomId}/chinchiro`));
            let order = Object.keys(snap.val().players || {}).filter(u => u !== snap.val().oya); order.push(snap.val().oya);
            await update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'playing', turnOrder: order, turnIndex: 0 });
        });

        document.getElementById('master-finish-btn').addEventListener('click', async () => {
            const snap = await get(ref(db, `rooms/${currentRoomId}`));
            calculateAndApplyPayout(snap.val());
            update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'waiting' });
            get(ref(db, `rooms/${currentRoomId}/chinchiro/players`)).then(s => { s.forEach(c => update(c.ref, { yakuData: null, isRolling: false, finalDice: null })); });
            resetBet();
        });

        // --- ベットとキャンセル ---
        window.addBet = (amt) => { 
            currentBet += amt; 
            if (currentBet > myData.coins) currentBet = myData.coins; // 所持金以上は賭けられないように制限
            document.getElementById('current-bet-display').innerText = currentBet; 
            document.getElementById('my-coins-game').innerText = myData.coins - currentBet; 
        };
        window.resetBet = () => { 
            currentBet = 0; 
            document.getElementById('current-bet-display').innerText = currentBet; 
            document.getElementById('my-coins-game').innerText = myData.coins; 
        };
        window.confirmBet = async () => {
            if (currentBet <= 0) return alert("100以上ベットしてください！");
            await update(ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`), { bet: currentBet, isBetConfirmed: true });
        };
        window.cancelBet = async () => {
            await update(ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`), { isBetConfirmed: false });
        };

        // --- サイコロ判定とアニメーション ---
        function evaluateYaku(d1, d2, d3) {
            const d = [d1, d2, d3].sort((a, b) => a - b); const s = d.join('');
            if (s === '111') return { name: 'ピンゾロ 🎲🎲🎲', rank: 6, multiplier: 5, score: 0 };
            if (d[0]===d[1] && d[1]===d[2]) return { name: 'ゾロ目 🎲🎲🎲', rank: 5, multiplier: 3, score: 0 };
            if (s === '456') return { name: 'シゴロ 🎲🎲🎲', rank: 4, multiplier: 2, score: 0 };
            if (s === '123') return { name: 'ヒフミ (罰金) 💀', rank: 1, multiplier: -2, score: 0 };
            if (d[0]===d[1]) return { name: `出目 ${d[2]} 🎲`, rank: 3, multiplier: 2, score: d[2] };
            if (d[1]===d[2]) return { name: `出目 ${d[0]} 🎲`, rank: 3, multiplier: 2, score: d[0] };
            if (d[0]===d[2]) return { name: `出目 ${d[1]} 🎲`, rank: 3, multiplier: 2, score: d[1] };
            return { name: '目無し 💨', rank: 0, multiplier: 0, score: 0 };
        }

        function roll3DDice(diceId, index, resultNum) {
            // 絶対角度を記憶し、そこからさらに3〜4回転させることで「巻き戻り」を防止
            globalDiceSpinsX[index] += 1080 + (Math.floor(Math.random()*2)*360); 
            globalDiceSpinsY[index] += 1080 + (Math.floor(Math.random()*2)*360);
            
            let fx=0, fy=0; 
            switch(resultNum){ case 1:break; case 2:fx=90;break; case 3:fy=-90;break; case 4:fy=90;break; case 5:fx=-90;break; case 6:fy=180;break; }
            document.getElementById(diceId).style.transform = `rotateX(${globalDiceSpinsX[index] + fx}deg) rotateY(${globalDiceSpinsY[index] + fy}deg)`;
        }

        document.getElementById('roll-dice-btn').addEventListener('click', async () => {
            const pRef = ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`);
            document.getElementById('roll-dice-btn').classList.add('hidden'); // 連打防止
            await update(pRef, { isRolling: true });
            
            const d1 = Math.floor(Math.random() * 6)+1, d2 = Math.floor(Math.random() * 6)+1, d3 = Math.floor(Math.random() * 6)+1;
            
            roll3DDice('dice1-3d', 1, d1);
            roll3DDice('dice2-3d', 2, d2);
            roll3DDice('dice3-3d', 3, d3);

            const yaku = evaluateYaku(d1, d2, d3);
            const chSnap = await get(ref(db, `rooms/${currentRoomId}/chinchiro`));
            const newCount = chSnap.val().players[currentUserId].rollCount + 1;

            setTimeout(async () => {
                let turnEnds = false;
                if (yaku.rank > 0 || newCount >= 3) turnEnds = true;
                if (newCount >= 3 && yaku.rank === 0) yaku.name = '目無し (確定) 💨';
                
                await update(pRef, { isRolling: false, finalDice: [d1,d2,d3], rollCount: newCount });

                if (turnEnds) {
                    await update(pRef, { yakuData: yaku });
                    if (chSnap.val().turnIndex + 1 >= chSnap.val().turnOrder.length) update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'payout' });
                    else update(ref(db, `rooms/${currentRoomId}/chinchiro`), { turnIndex: chSnap.val().turnIndex + 1 });
                } else {
                    document.getElementById('roll-dice-btn').classList.remove('hidden');
                }
            }, 1200);
        });

        // --- 7. 清算 ---
        async function calculateAndApplyPayout(rData) {
            const members = rData.members; const cData = rData.chinchiro;
            const oyaUid = cData.oya; const oyaYaku = cData.players[oyaUid].yakuData;
            let updates = {};
            for (let uid in members) updates[`rooms/${currentRoomId}/members/${uid}/coins`] = members[uid].coins;

            for (let uid in cData.players) {
                if (uid === oyaUid) continue;
                const p = cData.players[uid]; const pYaku = p.yakuData; const bet = p.bet;
                if (pYaku.rank === 1) { updates[`rooms/${currentRoomId}/members/${uid}/coins`] -= (bet * 2); updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] += (bet * 2); }
                else if (oyaYaku.rank === 1) { updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] -= (bet * 2); updates[`rooms/${currentRoomId}/members/${uid}/coins`] += (bet * 2); }
                else if (pYaku.rank === 0) { updates[`rooms/${currentRoomId}/members/${uid}/coins`] -= bet; updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] += bet; }
                else if (oyaYaku.rank === 0) { updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] -= bet; updates[`rooms/${currentRoomId}/members/${uid}/coins`] += bet; }
                else {
                    if (pYaku.rank > oyaYaku.rank || (pYaku.rank === oyaYaku.rank && pYaku.score > oyaYaku.score)) {
                        updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] -= (bet * pYaku.multiplier); updates[`rooms/${currentRoomId}/members/${uid}/coins`] += (bet * pYaku.multiplier);
                    } else if (oyaYaku.rank > pYaku.rank || (oyaYaku.rank === pYaku.rank && oyaYaku.score > pYaku.score)) {
                        updates[`rooms/${currentRoomId}/members/${uid}/coins`] -= bet; updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] += bet;
                    }
                }
            }
            await update(ref(db), updates);
            const myNewCoins = updates[`rooms/${currentRoomId}/members/${currentUserId}/coins`];
            if(myNewCoins !== undefined) { myData.coins = myNewCoins; document.getElementById('my-coins-home').innerText = myNewCoins; document.getElementById('my-coins-game').innerText = myNewCoins; update(ref(db, `users/${currentUserId}`), { coins: myNewCoins }); }
        }
    </script>
</body>

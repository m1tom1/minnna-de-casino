<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボードゲーム・カジノ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1c23; color: #f3f4f6; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 常に表示されるルーム情報ヘッダー */
        #room-header-bar { width: 100%; background: #2d3142; padding: 10px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; font-size: 14px; }
        .copy-url-btn { background: #3b82f6; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .container { background-color: #242631; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 500px; text-align: center; margin-top: 20px; margin-bottom: 20px; }
        h1 { color: #ffd700; margin-bottom: 24px; font-size: 24px; }
        .hidden { display: none !important; }
        
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #3f4257; background-color: #1a1c23; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; }
        button.main-btn { background-color: #ffd700; color: #1a1c23; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        button.main-btn:disabled { background-color: #555; cursor: not-allowed; }
        button.danger-btn { background-color: #ef4444; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
        .emoji-btn { font-size: 30px; background: #1a1c23; border: 2px solid #3f4257; border-radius: 8px; cursor: pointer; padding: 8px; }
        .emoji-btn.selected { border-color: #ffd700; background-color: #2d3142; transform: scale(1.05); }
        .profile-bar { background: #1a1c23; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 4px solid #ffd700; }
        
        .section-title { font-size: 14px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; margin-top: 16px; text-align: left; }
        .user-list { background: #1a1c23; border-radius: 8px; padding: 10px; min-height: 50px; text-align: left; margin-bottom: 20px; }
        .list-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #2d303f; }
        .badge { color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .bg-host { background: #3f4257; } .bg-oya { background: #ef4444; } .bg-turn { background: #10b981; } .bg-done { background: #3b82f6; }
        
        /* 卓の一覧カード */
        .game-card { background: #1a1c23; border: 1px solid #3f4257; border-radius: 8px; padding: 15px; text-align: left; margin-bottom: 15px; }
        .game-card h3 { margin: 0 0 10px 0; color: #fff; }
        
        /* 3Dサイコロのスタイル */
        .dice-area { display: flex; justify-content: center; gap: 20px; margin: 30px 0; perspective: 600px; }
        .dice-3d { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .face { position: absolute; width: 60px; height: 60px; background: #f8f9fa; border-radius: 8px; box-shadow: inset 0 0 15px rgba(0,0,0,0.1), 0 0 2px rgba(0,0,0,0.2); display: grid; grid-template-areas: "a b c" "d e f" "g h i"; padding: 10px; box-sizing: border-box; }
        .dot { width: 12px; height: 12px; background: #1f2937; border-radius: 50%; box-shadow: inset 0 3px 5px rgba(0,0,0,0.5), 0 1px 1px rgba(255,255,255,0.8); justify-self: center; align-self: center; }
        .front .dot-center { background: #ef4444; width: 16px; height: 16px; }
        .dot-center { grid-area: e; } .dot-top-left { grid-area: a; } .dot-top-right { grid-area: c; } .dot-middle-left { grid-area: d; } .dot-middle-right { grid-area: f; } .dot-bottom-left { grid-area: g; } .dot-bottom-right { grid-area: i; }
        .front  { transform: translateZ(30px); } .back   { transform: rotateY(180deg) translateZ(30px); } .right  { transform: rotateY(90deg) translateZ(30px); } .left   { transform: rotateY(-90deg) translateZ(30px); } .top    { transform: rotateX(90deg) translateZ(30px); } .bottom { transform: rotateX(-90deg) translateZ(30px); }
    </style>
</head>
<body>

    <div id="room-header-bar" class="hidden">
        <div>🏠 Room: <span id="hdr-room-code" style="color: #ffd700; font-weight: bold;"></span></div>
        <button class="copy-url-btn" onclick="copyInviteUrl()">招待URLをコピー 🔗</button>
    </div>

    <div class="container">
        <div id="login-screen">
            <h1>カジノ入場ゲート</h1>
            <input type="text" id="username" placeholder="名前を入力" maxlength="10">
            <div class="emoji-grid">
                <button class="emoji-btn" onclick="selectEmoji('🐱')">🐱</button>
                <button class="emoji-btn" onclick="selectEmoji('🕶️')">🕶️</button>
                <button class="emoji-btn" onclick="selectEmoji('🎲')">🎲</button>
                <button class="emoji-btn" onclick="selectEmoji('🦊')">🦊</button>
            </div>
            <button class="main-btn" id="login-btn">決定</button>
        </div>

        <div id="home-screen" class="hidden">
            <h1>ホーム</h1>
            <div class="profile-bar">
                <div><span id="my-emoji"></span> <span id="my-name"></span></div>
                <div style="color: #ffd700;">🪙 <span id="my-coins-home"></span></div>
            </div>
            <button class="main-btn" id="create-room-btn">🌟 新しく部屋を作る</button>
            <div class="section-title">合言葉で参加</div>
            <input type="text" id="room-code-input" placeholder="部屋コードを入力">
            <button class="main-btn" id="join-room-btn" style="background-color: #3b82f6; color: white;">入室する</button>
        </div>

        <div id="room-lobby-screen" class="hidden">
            <h1>ルームロビー (大広間)</h1>
            <div class="section-title">部屋にいるメンバー</div>
            <div class="user-list" id="room-members-list"></div>

            <div class="section-title">遊べるゲーム卓</div>
            <div class="game-card">
                <h3>🎲 チンチロ</h3>
                <p style="font-size: 12px; color: #9ca3af;" id="chinchiro-status-text">待機中 (0人)</p>
                <button class="main-btn" id="join-chinchiro-btn" style="padding: 10px;">卓に参加する / 観戦する</button>
            </div>
            
            <button class="main-btn" id="leave-room-btn" style="background-color: #3f4257; color: white; margin-top: 20px;">部屋を退出する</button>
        </div>

        <div id="chinchiro-screen" class="hidden">
            <h1>🎲 チンチロ卓</h1>
            <div class="profile-bar">
                <div>所持: 🪙 <span id="my-coins-game"></span></div>
                <div style="font-size: 12px; color: #9ca3af;">(進行中: <span id="game-phase-text">待機室</span>)</div>
            </div>

            <div id="betting-area" class="hidden" style="margin-bottom: 20px; background: #2d303f; padding: 15px; border-radius: 8px;">
                <div style="font-size: 16px; margin-bottom: 10px;">賭け金: <span id="current-bet-display" style="color: #ffd700; font-weight: bold; font-size: 20px;">0</span> コイン</div>
                <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
                    <button class="main-btn" onclick="addBet(100)" style="width: auto; padding: 8px 16px;">+100</button>
                    <button class="main-btn" onclick="addBet(1000)" style="width: auto; padding: 8px 16px;">+1000</button>
                    <button class="danger-btn" onclick="resetBet()" style="width: auto; padding: 8px 16px;">クリア</button>
                </div>
                <button class="main-btn" onclick="confirmBet()" id="confirm-bet-btn">ベットを確定する</button>
            </div>

            <div class="dice-area hidden" id="dice-area">
                <div class="dice-3d" id="dice1-3d"><div class="face front"><div class="dot dot-center"></div></div><div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div><div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div><div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div></div>
                <div class="dice-3d" id="dice2-3d"><div class="face front"><div class="dot dot-center"></div></div><div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div><div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div><div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div></div>
                <div class="dice-3d" id="dice3-3d"><div class="face front"><div class="dot dot-center"></div></div><div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div><div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div><div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div><div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div></div>
            </div>

            <div id="game-status-text" style="font-size: 16px; font-weight: bold; color: #ffd700; margin-bottom: 20px;"></div>
            <div class="section-title">卓のメンバー</div>
            <div class="user-list" id="table-players" style="font-size: 14px;"></div>

            <button class="danger-btn hidden" id="master-start-btn">ベットフェーズへ (マスター)</button>
            <button class="danger-btn hidden" id="master-roll-phase-btn">サイコロフェーズへ進む (マスター)</button>
            <button class="danger-btn hidden" id="roll-dice-btn">サイコロを振る！</button>
            <button class="main-btn hidden" id="master-finish-btn">清算して待機室に戻る (マスター)</button>
            <button class="main-btn" id="leave-table-btn" style="background-color: #3f4257; color: white;">ロビーに戻る</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ▼▼▼ あなたのFirebase設定 ▼▼▼
        const firebaseConfig = {
            apiKey: "AIzaSyDFGxRrxG104_Dw2XTXiQwIJ0KsVxkM42w",
            authDomain: "minnna-de-casino.firebaseapp.com",
            databaseURL: "https://minnna-de-casino-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "minnna-de-casino",
            storageBucket: "minnna-de-casino.firebasestorage.app",
            messagingSenderId: "246754430160",
            appId: "1:246754430160:web:9907c3159c2003c6aba2d5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let myData = { emoji: '🐱', name: '', coins: 1000 };
        let currentUserId = null;
        let currentRoomId = null;
        let isTableMaster = false;
        let currentBet = 0;
        let unsubscribeRoom = null;

        window.selectEmoji = (e) => { myData.emoji = e; document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('selected', b.innerText === e)); }
        function showScreen(id) { ['login-screen', 'home-screen', 'room-lobby-screen', 'chinchiro-screen'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        
        // 招待URLのコピー機能
        window.copyInviteUrl = () => {
            const url = `${window.location.origin}${window.location.pathname}?room=${currentRoomId}`;
            navigator.clipboard.writeText(url); alert("招待URLをコピーしました！");
        };

        // --- 1. ログインと初期化 ---
        window.onload = () => {
            const savedName = localStorage.getItem('casinoName');
            const savedEmoji = localStorage.getItem('casinoEmoji');
            const urlParams = new URLSearchParams(window.location.search);
            const inviteRoom = urlParams.get('room');

            if (savedName) {
                document.getElementById('username').value = savedName;
                selectEmoji(savedEmoji || '🐱');
                // 自動ログイン実行。URLに部屋があればそのまま入室処理へ
                performLogin(inviteRoom);
            } else {
                selectEmoji('🐱');
                // 名前がない undefined バグ防止：URLがあってもまずはログイン画面で止める
            }
        };

        document.getElementById('login-btn').addEventListener('click', () => {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert('名前を入力してね！');
            localStorage.setItem('casinoName', name);
            localStorage.setItem('casinoEmoji', myData.emoji);
            const urlParams = new URLSearchParams(window.location.search);
            performLogin(urlParams.get('room'));
        });

        async function performLogin(inviteRoomId) {
            myData.name = localStorage.getItem('casinoName');
            const userCredential = await signInAnonymously(auth);
            currentUserId = userCredential.user.uid;

            const userRef = ref(db, `users/${currentUserId}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                myData.coins = snapshot.val().coins;
            } else {
                await set(userRef, myData);
            }

            document.getElementById('my-name').innerText = myData.name;
            document.getElementById('my-emoji').innerText = myData.emoji;
            document.getElementById('my-coins-home').innerText = myData.coins;
            document.getElementById('my-coins-game').innerText = myData.coins;

            if (inviteRoomId) joinRoom(inviteRoomId);
            else showScreen('home-screen');
        }

        // --- 2. 部屋の作成・参加・大広間 ---
        document.getElementById('create-room-btn').addEventListener('click', async () => {
            const roomId = Math.random().toString(36).substring(2, 6).toUpperCase();
            await set(ref(db, `rooms/${roomId}`), {
                createdAt: Date.now(),
                chinchiro: { status: 'waiting', master: currentUserId, oya: currentUserId, players: {} }
            });
            joinRoom(roomId);
        });

        document.getElementById('join-room-btn').addEventListener('click', () => {
            const r = document.getElementById('room-code-input').value.toUpperCase();
            if(r) joinRoom(r);
        });

        async function joinRoom(roomId) {
            const roomSnap = await get(ref(db, `rooms/${roomId}`));
            if (!roomSnap.exists()) {
                window.history.replaceState({}, '', window.location.pathname);
                return alert("その部屋は見つかりません！");
            }
            
            currentRoomId = roomId;
            document.getElementById('hdr-room-code').innerText = roomId;
            document.getElementById('room-header-bar').classList.remove('hidden');
            
            const url = new URL(window.location.href); url.searchParams.set('room', roomId); window.history.replaceState({}, '', url);

            // 部屋のメンバーリストに自分を追加
            const myRoomRef = ref(db, `rooms/${roomId}/members/${currentUserId}`);
            await set(myRoomRef, myData);
            onDisconnect(myRoomRef).remove();

            startRoomListener(roomId);
        }

        function startRoomListener(roomId) {
            if (unsubscribeRoom) unsubscribeRoom();
            unsubscribeRoom = onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    alert("部屋が解散されました"); currentRoomId = null;
                    document.getElementById('room-header-bar').classList.add('hidden');
                    window.history.replaceState({}, '', window.location.pathname);
                    showScreen('home-screen'); return;
                }
                renderRoomLobby(data);
                renderChinchiroTable(data.chinchiro, data.members);
            });
        }

        function renderRoomLobby(data) {
            const members = data.members || {};
            const listDiv = document.getElementById('room-members-list');
            listDiv.innerHTML = '';
            for (const [uid, user] of Object.entries(members)) {
                listDiv.innerHTML += `<div class="list-item"><span>${user.emoji}</span> <span>${user.name}</span> <span style="margin-left:auto">🪙${user.coins}</span></div>`;
            }

            // ゲーム卓のステータス
            const chin = data.chinchiro || { status: 'waiting', players: {} };
            const pCount = Object.keys(chin.players || {}).length;
            let statusTxt = chin.status === 'waiting' ? '待機中' : '進行中';
            document.getElementById('chinchiro-status-text').innerText = `${statusTxt} (${pCount}人)`;
        }

        document.getElementById('leave-room-btn').addEventListener('click', async () => {
            if (currentRoomId) await remove(ref(db, `rooms/${currentRoomId}/members/${currentUserId}`));
            document.getElementById('room-header-bar').classList.add('hidden');
            window.history.replaceState({}, '', window.location.pathname);
            showScreen('home-screen');
        });

        // --- 3. チンチロ 卓システム ---
        document.getElementById('join-chinchiro-btn').addEventListener('click', async () => {
            const myTableRef = ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`);
            await set(myTableRef, { bet: 0, isBetConfirmed: false, isRolling: false, yakuData: null, rollCount: 0 });
            onDisconnect(myTableRef).remove();
            showScreen('chinchiro-screen');
        });

        document.getElementById('leave-table-btn').addEventListener('click', async () => {
            await remove(ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`));
            showScreen('room-lobby-screen');
        });

        function renderChinchiroTable(chinchiroData, allMembers) {
            if (!chinchiroData) return;
            const tablePlayers = chinchiroData.players || {};
            const pList = Object.keys(tablePlayers);
            
            // 自分が卓にいない場合はロビー画面のままにする
            if (!pList.includes(currentUserId)) return showScreen('room-lobby-screen');

            // マスター不在時の自動引き継ぎ
            isTableMaster = (chinchiroData.master === currentUserId);
            if (!pList.includes(chinchiroData.master) && pList.length > 0 && isTableMaster === false) {
                if (pList[0] === currentUserId) update(ref(db, `rooms/${currentRoomId}/chinchiro`), { master: currentUserId, oya: currentUserId });
            }

            const status = chinchiroData.status;
            const turnOrder = chinchiroData.turnOrder || [];
            const currentTurnUid = turnOrder[chinchiroData.turnIndex];

            // UIリセット
            document.getElementById('game-phase-text').innerText = status;
            document.getElementById('master-start-btn').classList.add('hidden');
            document.getElementById('master-roll-phase-btn').classList.add('hidden');
            document.getElementById('master-finish-btn').classList.add('hidden');
            document.getElementById('roll-dice-btn').classList.add('hidden');
            document.getElementById('betting-area').classList.add('hidden');
            document.getElementById('dice-area').classList.add('hidden');

            let mainMsg = "待機中...";
            let allBetConfirmed = true;

            // ステート別UI制御
            if (status === 'waiting') {
                if (isTableMaster && pList.length > 1) document.getElementById('master-start-btn').classList.remove('hidden');
                mainMsg = "参加者を待っています...";
            } 
            else if (status === 'betting') {
                document.getElementById('betting-area').classList.remove('hidden');
                pList.forEach(uid => { if(uid !== chinchiroData.oya && !tablePlayers[uid].isBetConfirmed) allBetConfirmed = false; });
                if (isTableMaster && allBetConfirmed) document.getElementById('master-roll-phase-btn').classList.remove('hidden');
                mainMsg = "賭け金を決めてください";
            }
            else if (status === 'playing') {
                document.getElementById('dice-area').classList.remove('hidden');
                if (currentTurnUid === currentUserId) document.getElementById('roll-dice-btn').classList.remove('hidden');
                
                const turnUserName = allMembers[currentTurnUid] ? allMembers[currentTurnUid].name : '誰か';
                const rc = tablePlayers[currentTurnUid] ? tablePlayers[currentTurnUid].rollCount : 0;
                mainMsg = `${turnUserName} のターン (残り ${3 - rc} 回振れます)`;

                // 誰かが振っている最中のサイコロアニメ表示
                if (currentTurnUid && tablePlayers[currentTurnUid] && tablePlayers[currentTurnUid].isRolling) {
                    mainMsg = `${turnUserName} がサイコロを振っています...`;
                } else if (currentTurnUid && tablePlayers[currentTurnUid] && tablePlayers[currentTurnUid].finalDice) {
                    // 出目を表示
                    const fd = tablePlayers[currentTurnUid].finalDice;
                    document.getElementById('dice1-3d').style.transform = getDiceTransform(fd[0]);
                    document.getElementById('dice2-3d').style.transform = getDiceTransform(fd[1]);
                    document.getElementById('dice3-3d').style.transform = getDiceTransform(fd[2]);
                }
            }
            else if (status === 'payout') {
                mainMsg = "結果発表！マスターが清算します";
                if (isTableMaster) document.getElementById('master-finish-btn').classList.remove('hidden');
            }

            document.getElementById('game-status-text').innerText = mainMsg;

            // プレイヤーリスト描画
            const usersDiv = document.getElementById('table-players');
            usersDiv.innerHTML = '';
            for (const uid of pList) {
                const uData = allMembers[uid];
                const pData = tablePlayers[uid];
                if(!uData) continue;
                
                let badges = "";
                if (uid === chinchiroData.master) badges += `<span class="badge bg-host">マスター</span> `;
                if (uid === chinchiroData.oya) badges += `<span class="badge bg-oya">親</span> `;
                if (status === 'playing' && uid === currentTurnUid) badges += `<span class="badge bg-turn">ターン</span> `;

                let st = "";
                if (status === 'betting' && uid !== chinchiroData.oya) {
                    st = pData.isBetConfirmed ? `<span class="badge bg-done">ベット完了 (${pData.bet}C)</span>` : "考え中...";
                } else if (status === 'playing' || status === 'payout') {
                    if (pData.yakuData) st = `<span style="color:#10b981;">${pData.yakuData.name}</span>`;
                    else st = "順番待ち";
                }

                usersDiv.innerHTML += `<div class="list-item"><span>${uData.emoji}</span> <span>${uData.name}</span> ${badges} <span style="margin-left:auto; font-weight:bold;">${st}</span></div>`;
            }
        }

        // --- 4. マスターの進行管理 ---
        document.getElementById('master-start-btn').addEventListener('click', () => {
            update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'betting' });
            get(ref(db, `rooms/${currentRoomId}/chinchiro/players`)).then(snap => {
                snap.forEach(c => update(c.ref, { bet: 0, isBetConfirmed: false, rollCount: 0, yakuData: null, finalDice: null }));
            });
            document.getElementById('confirm-bet-btn').innerText = "ベットを確定する";
            document.getElementById('confirm-bet-btn').disabled = false;
            resetBet();
        });

        document.getElementById('master-roll-phase-btn').addEventListener('click', async () => {
            const snap = await get(ref(db, `rooms/${currentRoomId}/chinchiro`));
            const cData = snap.val();
            let players = Object.keys(cData.players);
            // 親を最後に回すターン順を作成
            let order = players.filter(u => u !== cData.oya);
            order.push(cData.oya);

            await update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'playing', turnOrder: order, turnIndex: 0 });
        });

        document.getElementById('master-finish-btn').addEventListener('click', async () => {
            // 清算ロジックと初期化
            const snap = await get(ref(db, `rooms/${currentRoomId}`));
            const rData = snap.val();
            calculateAndApplyPayout(rData);
            
            // 次のゲームのために待機へ
            update(ref(db, `rooms/${currentRoomId}/chinchiro`), { status: 'waiting' });
            get(ref(db, `rooms/${currentRoomId}/chinchiro/players`)).then(s => {
                s.forEach(c => update(c.ref, { yakuData: null, isRolling: false, finalDice: null }));
            });
        });

        // --- 5. ベット機能 ---
        window.addBet = (amt) => {
            if (currentBet + amt > myData.coins) return alert("コインが足りません！");
            currentBet += amt; document.getElementById('current-bet-display').innerText = currentBet;
        };
        window.resetBet = () => { currentBet = 0; document.getElementById('current-bet-display').innerText = currentBet; };
        window.confirmBet = async () => {
            if (currentBet <= 0) return alert("100コイン以上ベットしてください！");
            document.getElementById('confirm-bet-btn').innerText = "確定済み"; document.getElementById('confirm-bet-btn').disabled = true;
            await update(ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`), { bet: currentBet, isBetConfirmed: true });
        };

        // --- 6. サイコロ・役判定・ターン進行 ---
        function evaluateYaku(d1, d2, d3) {
            const d = [d1, d2, d3].sort((a, b) => a - b); const s = d.join('');
            if (s === '111') return { name: 'ピンゾロ', rank: 6, multiplier: 5, score: 0 };
            if (d[0] === d[1] && d[1] === d[2]) return { name: 'ゾロ目', rank: 5, multiplier: 3, score: 0 };
            if (s === '456') return { name: 'シゴロ', rank: 4, multiplier: 2, score: 0 };
            if (s === '123') return { name: 'ヒフミ (罰金)', rank: 1, multiplier: -2, score: 0 };
            if (d[0] === d[1]) return { name: `出目 ${d[2]}`, rank: 3, multiplier: 2, score: d[2] };
            if (d[1] === d[2]) return { name: `出目 ${d[0]}`, rank: 3, multiplier: 2, score: d[0] };
            if (d[0] === d[2]) return { name: `出目 ${d[1]}`, rank: 3, multiplier: 2, score: d[1] };
            return { name: '目無し', rank: 0, multiplier: 0, score: 0 };
        }

        function getDiceTransform(num) {
            const rx = (Math.floor(Math.random()*2)+2)*360, ry = (Math.floor(Math.random()*2)+2)*360;
            let fx=0, fy=0;
            switch(num){ case 1:break; case 2:fx=90;break; case 3:fy=-90;break; case 4:fy=90;break; case 5:fx=-90;break; case 6:fy=180;break; }
            return `rotateX(${rx+fx}deg) rotateY(${ry+fy}deg)`;
        }

        document.getElementById('roll-dice-btn').addEventListener('click', async () => {
            const chRef = ref(db, `rooms/${currentRoomId}/chinchiro`);
            const pRef = ref(db, `rooms/${currentRoomId}/chinchiro/players/${currentUserId}`);
            const chSnap = await get(chRef); const cData = chSnap.val();
            const pData = cData.players[currentUserId];
            
            await update(pRef, { isRolling: true });
            
            // 3Dアニメーション用ランダム回転
            document.getElementById('dice1-3d').style.transform = getDiceTransform(Math.floor(Math.random()*6)+1);
            document.getElementById('dice2-3d').style.transform = getDiceTransform(Math.floor(Math.random()*6)+1);
            document.getElementById('dice3-3d').style.transform = getDiceTransform(Math.floor(Math.random()*6)+1);

            const d1 = Math.floor(Math.random() * 6) + 1, d2 = Math.floor(Math.random() * 6) + 1, d3 = Math.floor(Math.random() * 6) + 1;
            const yaku = evaluateYaku(d1, d2, d3);
            const newCount = pData.rollCount + 1;

            setTimeout(async () => {
                let turnEnds = false;
                // 役が確定（目無し以外）するか、3回振ったらターン終了
                if (yaku.rank > 0 || newCount >= 3) turnEnds = true;

                await update(pRef, { isRolling: false, finalDice: [d1,d2,d3], rollCount: newCount });

                if (turnEnds) {
                    await update(pRef, { yakuData: yaku });
                    if (cData.turnIndex + 1 >= cData.turnOrder.length) {
                        // 全員終了 -> 清算フェーズへ
                        update(chRef, { status: 'payout' });
                    } else {
                        // 次の人のターンへ
                        update(chRef, { turnIndex: cData.turnIndex + 1 });
                    }
                }
            }, 1500); // アニメーション時間
        });

        // --- 7. 清算ロジック (親 vs 子) ---
        async function calculateAndApplyPayout(rData) {
            const members = rData.members;
            const cData = rData.chinchiro;
            const oyaUid = cData.oya;
            const oyaYaku = cData.players[oyaUid].yakuData;
            
            let updates = {};
            for (let uid in members) updates[`rooms/${currentRoomId}/members/${uid}/coins`] = members[uid].coins;

            for (let uid in cData.players) {
                if (uid === oyaUid) continue;
                const p = cData.players[uid];
                const pYaku = p.yakuData;
                const bet = p.bet;

                if (pYaku.rank === 1) { // 子がヒフミ: 親に2倍払う
                    updates[`rooms/${currentRoomId}/members/${uid}/coins`] -= (bet * 2);
                    updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] += (bet * 2);
                } else if (oyaYaku.rank === 1) { // 親がヒフミ: 子に2倍払う
                    updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] -= (bet * 2);
                    updates[`rooms/${currentRoomId}/members/${uid}/coins`] += (bet * 2);
                } else if (pYaku.rank === 0) { // 子が目無し: 親の勝ち (賭け金没収)
                    updates[`rooms/${currentRoomId}/members/${uid}/coins`] -= bet;
                    updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] += bet;
                } else if (oyaYaku.rank === 0) { // 親が目無し: 子の勝ち (等倍支払い)
                    updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] -= bet;
                    updates[`rooms/${currentRoomId}/members/${uid}/coins`] += bet;
                } else {
                    // ランク勝負
                    if (pYaku.rank > oyaYaku.rank || (pYaku.rank === oyaYaku.rank && pYaku.score > oyaYaku.score)) {
                        // 子の勝ち
                        updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] -= (bet * pYaku.multiplier);
                        updates[`rooms/${currentRoomId}/members/${uid}/coins`] += (bet * pYaku.multiplier);
                    } else if (oyaYaku.rank > pYaku.rank || (oyaYaku.rank === pYaku.rank && oyaYaku.score > pYaku.score)) {
                        // 親の勝ち
                        updates[`rooms/${currentRoomId}/members/${uid}/coins`] -= bet;
                        updates[`rooms/${currentRoomId}/members/${oyaUid}/coins`] += bet;
                    }
                    // 引き分けは何もしない
                }
            }

            // DB一括更新
            await update(ref(db), updates);
            // ローカルのコイン表示更新用
            const myNewCoins = updates[`rooms/${currentRoomId}/members/${currentUserId}/coins`];
            if(myNewCoins !== undefined) {
                myData.coins = myNewCoins;
                document.getElementById('my-coins-home').innerText = myNewCoins;
                document.getElementById('my-coins-game').innerText = myNewCoins;
                update(ref(db, `users/${currentUserId}`), { coins: myNewCoins }); // 永続保存
            }
        }
    </script>
</body>

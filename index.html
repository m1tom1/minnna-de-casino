<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボードゲーム・カジノ (チンチロ実装)</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1c23; color: #f3f4f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #242631; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 450px; text-align: center; }
        h1 { color: #ffd700; margin-bottom: 24px; font-size: 24px; }
        .hidden { display: none !important; }
        
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #3f4257; background-color: #1a1c23; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; }
        button.main-btn { background-color: #ffd700; color: #1a1c23; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-bottom: 10px; }
        button.main-btn:hover { background-color: #e6c200; }
        button.danger-btn { background-color: #ef4444; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
        .emoji-btn { font-size: 30px; background: #1a1c23; border: 2px solid #3f4257; border-radius: 8px; cursor: pointer; padding: 8px; }
        .emoji-btn.selected { border-color: #ffd700; background-color: #2d3142; transform: scale(1.05); }
        .profile-bar { background: #1a1c23; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 4px solid #ffd700; }
        .section-title { font-size: 14px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; margin-top: 16px; text-align: left; }
        .user-list { background: #1a1c23; border-radius: 8px; padding: 10px; min-height: 100px; text-align: left; margin-bottom: 20px; }
        .list-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #2d303f; }
        .host-badge { background: #3f4257; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .oya-badge { background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; font-weight: bold;}
        
        /* 本格3Dサイコロのスタイル（CSS Dots版） */
        .dice-area { display: flex; justify-content: center; gap: 20px; margin: 30px 0; perspective: 600px; }
        .dice-3d { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.1, 0.9, 0.2, 1); }

        .face { 
            position: absolute; width: 60px; height: 60px; 
            background: #f8f9fa; border-radius: 8px; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1), 0 0 2px rgba(0,0,0,0.2); 
            display: grid; grid-template-areas: "a b c" "d e f" "g h i"; 
            padding: 10px; box-sizing: border-box;
        }

        .dot { 
            width: 12px; height: 12px; background: #1f2937; border-radius: 50%; 
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.5), 0 1px 1px rgba(255,255,255,0.8); 
            justify-self: center; align-self: center; 
        }

        .front .dot-center { background: #ef4444; width: 16px; height: 16px; box-shadow: inset 0 3px 5px rgba(100,0,0,0.6), 0 1px 1px rgba(255,255,255,0.8); }

        .dot-center { grid-area: e; }
        .dot-top-left { grid-area: a; }
        .dot-top-right { grid-area: c; }
        .dot-middle-left { grid-area: d; }
        .dot-middle-right { grid-area: f; }
        .dot-bottom-left { grid-area: g; }
        .dot-bottom-right { grid-area: i; }

        .front  { transform: translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h1>カジノ入場ゲート</h1>
            <input type="text" id="username" placeholder="名前を入力" maxlength="10">
            <div class="emoji-grid">
                <button class="emoji-btn" onclick="selectEmoji('🐱')">🐱</button>
                <button class="emoji-btn" onclick="selectEmoji('🕶️')">🕶️</button>
                <button class="emoji-btn" onclick="selectEmoji('🎲')">🎲</button>
                <button class="emoji-btn" onclick="selectEmoji('🦊')">🦊</button>
            </div>
            <button class="main-btn" id="login-btn">決定</button>
        </div>

        <div id="lobby-screen" class="hidden">
            <h1>Game Lobby</h1>
            <div class="profile-bar">
                <div class="user-info"><span id="my-emoji"></span> <span id="my-name"></span></div>
                <div class="coin-amount">🪙 <span id="my-coins-lobby"></span>C</div>
            </div>
            <button class="main-btn" id="create-room-btn">🌟 新しく部屋を作る</button>
            <div class="section-title">合言葉で参加</div>
            <input type="text" id="room-code-input" placeholder="部屋コードを入力">
            <button class="main-btn" id="join-room-btn" style="background-color: #3b82f6; color: white;">入室する</button>
        </div>

        <div id="room-screen" class="hidden">
            <h1 id="room-title">Room: ----</h1>
            <p style="font-size: 12px; color: #9ca3af; margin-top:-15px;">友達を誘うURL: <br><span id="invite-url" style="color:#60a5fa; cursor:pointer;"></span></p>
            <div class="section-title">テーブルにいるプレイヤー</div>
            <div class="user-list" id="room-users"></div>
            
            <button class="danger-btn hidden" id="start-game-btn">ゲームスタート！(ホスト専用)</button>
            <div id="waiting-msg" style="color: #ffd700; margin-bottom: 20px;">ホストが開始するのを待っています...</div>
            <button class="main-btn" id="leave-room-btn" style="background-color: #3f4257; color: white;">退出する</button>
        </div>

        <div id="game-screen" class="hidden">
            <h1>🎲 チンチロリン</h1>
            <div class="profile-bar">
                <div>所持コイン</div>
                <div class="coin-amount">🪙 <span id="my-coins-game"></span>C</div>
            </div>

            <div class="dice-area" id="dice-area">
                <div class="dice-3d" id="dice1-3d">
                    <div class="face front"><div class="dot dot-center"></div></div>
                    <div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                </div>
                <div class="dice-3d" id="dice2-3d">
                    <div class="face front"><div class="dot dot-center"></div></div>
                    <div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                </div>
                <div class="dice-3d" id="dice3-3d">
                    <div class="face front"><div class="dot dot-center"></div></div>
                    <div class="face bottom"><div class="dot dot-top-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face right"><div class="dot dot-top-left"></div><div class="dot dot-center"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face left"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face top"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-center"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                    <div class="face back"><div class="dot dot-top-left"></div><div class="dot dot-top-right"></div><div class="dot dot-middle-left"></div><div class="dot dot-middle-right"></div><div class="dot dot-bottom-left"></div><div class="dot dot-bottom-right"></div></div>
                </div>
            </div>

            <div id="game-status-text" style="font-size: 18px; font-weight: bold; color: #ffd700; margin-bottom: 20px;">あなたの役: (まだ振っていません)</div>

            <div class="user-list" id="game-players" style="font-size: 14px;"></div>

            <button class="danger-btn" id="roll-dice-btn">サイコロを振る！</button>
            <button class="main-btn" id="back-to-room-btn" style="background-color: #3f4257; color: white;">待機室に戻る (ホスト専用)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFGxRrxG104_Dw2XTXiQwIJ0KsVxkM42w",
            authDomain: "minnna-de-casino.firebaseapp.com",
            databaseURL: "https://minnna-de-casino-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "minnna-de-casino",
            storageBucket: "minnna-de-casino.firebasestorage.app",
            messagingSenderId: "246754430160",
            appId: "1:246754430160:web:9907c3159c2003c6aba2d5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userData = { emoji: '🐱', name: '', coins: 1000, dice: [0,0,0], isRolling: false, lastYaku: '' };
        let currentUserId = null;
        let currentRoomId = null;
        let isHost = false;

        window.selectEmoji = (emoji) => {
            userData.emoji = emoji;
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.toggle('selected', btn.innerText === emoji));
        }

        function showScreen(screenId) {
            ['login-screen', 'lobby-screen', 'room-screen', 'game-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        window.onload = () => {
            const savedName = localStorage.getItem('casinoName');
            const savedEmoji = localStorage.getItem('casinoEmoji');
            if (savedName) {
                document.getElementById('username').value = savedName;
                selectEmoji(savedEmoji || '🐱');
                document.getElementById('login-btn').click();
            } else {
                selectEmoji('🐱');
            }
        };

        document.getElementById('login-btn').addEventListener('click', async () => {
            userData.name = document.getElementById('username').value.trim();
            if (!userData.name) return alert('名前を入力してね！');

            localStorage.setItem('casinoName', userData.name);
            localStorage.setItem('casinoEmoji', userData.emoji);

            const userCredential = await signInAnonymously(auth);
            currentUserId = userCredential.user.uid;

            const userRef = ref(db, `users/${currentUserId}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                userData.coins = snapshot.val().coins;
            } else {
                await set(userRef, { name: userData.name, emoji: userData.emoji, coins: 1000 });
            }

            document.getElementById('my-name').innerText = userData.name;
            document.getElementById('my-emoji').innerText = userData.emoji;
            document.getElementById('my-coins-lobby').innerText = userData.coins;
            document.getElementById('my-coins-game').innerText = userData.coins;

            const urlParams = new URLSearchParams(window.location.search);
            const inviteRoom = urlParams.get('room');
            if (inviteRoom) {
                joinRoom(inviteRoom);
            } else {
                showScreen('lobby-screen');
            }
        });

        document.getElementById('create-room-btn').addEventListener('click', async () => {
            const roomId = Math.random().toString(36).substring(2, 6).toUpperCase();
            await set(ref(db, `rooms/${roomId}`), { status: 'waiting', host: currentUserId, oya: currentUserId });
            joinRoom(roomId);
        });

        document.getElementById('join-room-btn').addEventListener('click', () => {
            const roomId = document.getElementById('room-code-input').value.toUpperCase();
            if(roomId) joinRoom(roomId);
        });

        async function joinRoom(roomId) {
            const roomSnap = await get(ref(db, `rooms/${roomId}`));
            if (!roomSnap.exists()) return alert("その部屋は見つかりません！");

            currentRoomId = roomId;
            document.getElementById('room-title').innerText = `Room: ${roomId}`;
            
            // リロード対策：URLに部屋コードを付与して記憶させる
            const url = new URL(window.location.href);
            url.searchParams.set('room', roomId);
            window.history.replaceState({}, '', url);

            document.getElementById('invite-url').innerText = url.href;
            document.getElementById('invite-url').onclick = () => { navigator.clipboard.writeText(url.href); alert("URLをコピーしました！"); };

            const myPlayerRef = ref(db, `rooms/${roomId}/players/${currentUserId}`);
            await set(myPlayerRef, userData);
            onDisconnect(myPlayerRef).remove();

            listenToRoom(roomId);
        }

        function listenToRoom(roomId) {
            onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) { 
                    alert("部屋が解散されました"); 
                    window.history.replaceState({}, '', window.location.pathname);
                    showScreen('lobby-screen');
                    return; 
                }

                const players = data.players || {};
                isHost = (data.host === currentUserId);
                
                if (!players[data.host] && isHost) {
                    const remaining = Object.keys(players);
                    if (remaining.length > 0) update(ref(db, `rooms/${roomId}`), { host: remaining[0], oya: remaining[0] });
                }

                if (data.status === 'playing') {
                    showScreen('game-screen');
                    renderGameBoard(data, players);
                } else {
                    showScreen('room-screen');
                    renderWaitingRoom(data, players);
                }
            });
        }

        function renderWaitingRoom(data, players) {
            const usersDiv = document.getElementById('room-users');
            usersDiv.innerHTML = '';
            for (const [uid, player] of Object.entries(players)) {
                usersDiv.innerHTML += `<div class="list-item"><span>${player.emoji}</span> <span>${player.name}</span>
                    ${uid === data.host ? '<span class="host-badge">ホスト</span>' : ''}</div>`;
            }
            document.getElementById('start-game-btn').classList.toggle('hidden', !isHost);
            document.getElementById('waiting-msg').classList.toggle('hidden', isHost);
        }

        function renderGameBoard(data, players) {
            const gameDiv = document.getElementById('game-players');
            gameDiv.innerHTML = '';
            document.getElementById('back-to-room-btn').classList.toggle('hidden', !isHost);

            for (const [uid, player] of Object.entries(players)) {
                const isOya = (uid === data.oya);
                let statusText = '待機中...';
                if (player.isRolling) {
                    statusText = '振っています...';
                } else if (player.lastYaku) {
                    statusText = player.lastYaku;
                }

                gameDiv.innerHTML += `
                    <div class="list-item">
                        <span>${player.emoji}</span> <span>${player.name}</span>
                        ${isOya ? '<span class="oya-badge">親</span>' : ''}
                        <span style="margin-left:auto; font-weight:bold; color:#60a5fa;">${statusText}</span>
                    </div>`;
            }
        }

        document.getElementById('start-game-btn').addEventListener('click', () => {
            update(ref(db, `rooms/${currentRoomId}`), { status: 'playing' });
        });

        document.getElementById('back-to-room-btn').addEventListener('click', () => {
            update(ref(db, `rooms/${currentRoomId}`), { status: 'waiting' });
            get(ref(db, `rooms/${currentRoomId}/players`)).then(snap => {
                snap.forEach(child => { update(child.ref, { dice: [0,0,0], isRolling: false, lastYaku: '' }); });
            });
        });

        // 退出処理（URLもリセットする）
        document.getElementById('leave-room-btn').addEventListener('click', async () => {
            if (currentRoomId) await remove(ref(db, `rooms/${currentRoomId}/players/${currentUserId}`));
            window.history.replaceState({}, '', window.location.pathname);
            currentRoomId = null;
            showScreen('lobby-screen');
        });

        // 裏画面対策
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && currentRoomId) {
                setTimeout(() => joinRoom(currentRoomId), 1000);
            }
        });

        function evaluateYaku(d1, d2, d3) {
            const dice = [d1, d2, d3].sort((a, b) => a - b);
            const str = dice.join('');
            if (str === '111') return { name: 'ピンゾロ', multiplier: 5 };
            if (dice[0] === dice[1] && dice[1] === dice[2]) return { name: 'ゾロ目', multiplier: 3 };
            if (str === '456') return { name: 'シゴロ', multiplier: 2 };
            if (str === '123') return { name: 'ヒフミ (罰金)', multiplier: -2 };
            if (dice[0] === dice[1]) return { name: `出目 ${dice[2]}`, multiplier: 2, value: dice[2] };
            if (dice[1] === dice[2]) return { name: `出目 ${dice[0]}`, multiplier: 2, value: dice[0] };
            if (dice[0] === dice[2]) return { name: `出目 ${dice[1]}`, multiplier: 2, value: dice[1] };
            return { name: '目無し', multiplier: 0, value: 0 };
        }

        function roll3DDice(diceId, resultNum) {
            const diceEl = document.getElementById(diceId);
            const spinsX = (Math.floor(Math.random() * 2) + 2) * 360; 
            const spinsY = (Math.floor(Math.random() * 2) + 2) * 360;
            
            let rotX = 0, rotY = 0;
            switch(resultNum) {
                case 1: rotX = 0; rotY = 0; break;
                case 2: rotX = 90; rotY = 0; break;
                case 3: rotX = 0; rotY = -90; break;
                case 4: rotX = 0; rotY = 90; break;
                case 5: rotX = -90; rotY = 0; break;
                case 6: rotX = 0; rotY = 180; break;
            }
            diceEl.style.transform = `rotateX(${spinsX + rotX}deg) rotateY(${spinsY + rotY}deg)`;
        }

        document.getElementById('roll-dice-btn').addEventListener('click', async () => {
            const myPlayerRef = ref(db, `rooms/${currentRoomId}/players/${currentUserId}`);
            await update(myPlayerRef, { isRolling: true, lastYaku: '' });
            
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const d3 = Math.floor(Math.random() * 6) + 1;
            
            roll3DDice('dice1-3d', d1);
            roll3DDice('dice2-3d', d2);
            roll3DDice('dice3-3d', d3);
            
            const yaku = evaluateYaku(d1, d2, d3);
            document.getElementById('game-status-text').innerText = `あなたの役: ${yaku.name}！`;

            setTimeout(async () => {
                await update(myPlayerRef, { dice: [d1, d2, d3], isRolling: false, lastYaku: yaku.name });
            }, 1200);
        });
    </script>
</body>
</html>
